es","role":"Clinical Director / QI / HR","where_verified":"Records; Staff Interview; Training Records","common_findings":"Competencies assumed but not mapped across team; gaps in withdrawal/danger screening or co-occurring assessment skills","risk_level":"High","corrective_action":"Create team competency coverage map; address gaps with training/hiring; monitor via chart audits and supervision"},{"standard":"HRM.01.07.01","ep":"EP 1","question":"Show me performance evaluations\u2014how do they reflect performance expectations tied to job descriptions (or contracts for contracted staff)?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Performance evaluation forms; expectations matrix tied to JDs/contracts; completed evaluations","role":"HR / Department Leaders","where_verified":"HR Files","common_findings":"Eval tool not aligned to JD; contractors not evaluated per contract expectations","risk_level":"Moderate","corrective_action":"Revise evaluation tool to map to JD/contract; train evaluators; audit completeness"},{"standard":"HRM.01.07.01","ep":"EP 2","question":"How often do you evaluate staff performance (at least every 3 years or more often per law/policy), and how do you document completion and timeliness?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Performance evaluation schedule; tracking log; completed evaluations; overdue report","role":"HR / Department Leaders","where_verified":"HR Files; Records","common_findings":"Evaluations overdue; no tracking; missing documentation","risk_level":"Moderate","corrective_action":"Implement evaluation tracker and escalation; complete overdue evaluations; report status to leadership"},{"standard":"HRM.01.07.01","ep":"EP 3","question":"If PI activities generate findings about staff providing direct care/services, how do you use those findings in staff performance evaluations?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"PI reports; audit results; evaluation forms referencing PI findings; coaching documentation","role":"QI / Department Leaders / HR","where_verified":"PI Files; HR Files","common_findings":"PI findings not fed into evaluations; repeated issues without accountability","risk_level":"High","corrective_action":"Integrate PI findings into eval process; establish coaching/remediation; track improvement"},{"standard":"HRM.01.07.01","ep":"EP 4","question":"How do you confirm each staff member\u2019s adherence to organizational policies, procedures, rules, and regulations as part of evaluation or ongoing management?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Policy attestation records; compliance audits; disciplinary/coaching documentation; performance eval sections","role":"HR / Compliance / Department Leaders","where_verified":"HR Files; Records","common_findings":"No documented confirmation of policy adherence; inconsistent enforcement","risk_level":"Moderate","corrective_action":"Add policy-adherence verification to eval and supervision; implement routine compliance checks and documentation"}]},"IM":{"name":"Information Management","questions":[{"standard":"IM.01.01.01","ep":"EP 2","question":"How does the organization identify how data and information enter, flow within, are stored, and leave the organization?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Information flow diagrams; data inventories; interfaces list; policies describing data movement","role":"IT / Compliance / Leadership","where_verified":"Policy; Records; Staff Interview","common_findings":"Data flow not mapped; storage points unclear; external data exchanges undocumented","risk_level":"High","corrective_action":"Map end-to-end data flows; approve and review annually; train leaders on dependencies"},{"standard":"IM.01.01.03","ep":"EP 1","question":"Show me your written plan for managing interruptions to information processes (paper, electronic, or hybrid).","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Information continuity/downtime plan; alternative procedures; approvals","role":"IT / EM / Leadership","where_verified":"Policy; Records","common_findings":"Downtime plan missing or outdated; staff unfamiliar","risk_level":"High","corrective_action":"Update downtime plan; align with EM; train staff and test annually"},{"standard":"IM.01.01.03","ep":"EP 2","question":"How does the plan address scheduled/unscheduled interruptions, staff training on alternatives, backups, and restoration testing?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Backup schedules; restoration test results; training logs; downtime drills","role":"IT / EM / Leadership","where_verified":"Logs; Training Records","common_findings":"Backups not tested; staff not trained on downtime workflows","risk_level":"High","corrective_action":"Test backups/restoration; conduct downtime drills; document results and fixes"},{"standard":"IM.02.01.01","ep":"EP 1","question":"Show me the written policy that addresses the privacy of clinical/case information.","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Privacy/HIPAA policy; access/use limitations; sanctions","role":"Compliance / Privacy Officer","where_verified":"Policy","common_findings":"Policy missing or generic; not implemented in practice","risk_level":"High","corrective_action":"Revise privacy policy; train workforce; audit compliance"},{"standard":"IM.02.01.01","ep":"EP 3","question":"How do you ensure clinical/case information is used only for purposes permitted by law or policy?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Minimum necessary procedures; role-based access; audit logs","role":"Compliance / IT","where_verified":"Policy; Logs","common_findings":"Overbroad access; no audits of use","risk_level":"High","corrective_action":"Implement role-based access and audits; remediate inappropriate access"},{"standard":"IM.02.01.01","ep":"EP 4","question":"How do you ensure disclosures of clinical/case information are authorized and documented?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Authorization forms; release-of-information logs; disclosure tracking","role":"Compliance / HIM","where_verified":"Logs; Records","common_findings":"ROIs incomplete or missing; disclosures not tracked","risk_level":"High","corrective_action":"Standardize ROI process; audit disclosures; retrain staff"},{"standard":"IM.02.01.03","ep":"EP 1","question":"Show me the written policy addressing security of clinical/case information, including access, use, and disclosure.","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Information security policy; access controls; sanctions","role":"IT / Compliance","where_verified":"Policy","common_findings":"Security policy outdated or not followed","risk_level":"High","corrective_action":"Update security policy; align with current systems; train staff"},{"standard":"IM.02.01.03","ep":"EP 2","question":"How does policy address data integrity, permitted removal, and intentional destruction of information?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Data integrity policy; destruction schedule; removal approvals","role":"IT / Compliance / HIM","where_verified":"Policy; Records","common_findings":"Destruction/removal processes unclear or undocumented","risk_level":"High","corrective_action":"Clarify and document integrity/destruction controls; audit adherence"},{"standard":"IM.02.01.03","ep":"EP 5","question":"How do you protect against unauthorized access, use, or disclosure of information?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Access logs; monitoring reports; password policies","role":"IT / Compliance","where_verified":"Logs; Policy","common_findings":"Access not monitored; shared credentials","risk_level":"High","corrective_action":"Implement access monitoring; eliminate shared accounts; review permissions"},{"standard":"IM.02.01.03","ep":"EP 6","question":"How do you protect information against loss, damage, alteration, or accidental destruction?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Backups; disaster recovery controls; redundancy measures","role":"IT","where_verified":"Logs; Records","common_findings":"Backups incomplete; recovery not tested","risk_level":"High","corrective_action":"Test backups and recovery; document results; remediate gaps"},{"standard":"IM.02.01.03","ep":"EP 7","question":"How do you control the intentional destruction of clinical/case information?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Retention schedule; destruction logs; approvals","role":"HIM / Compliance","where_verified":"Records; Policy","common_findings":"No proof of controlled destruction","risk_level":"Moderate","corrective_action":"Implement destruction tracking and approvals; audit periodically"},{"standard":"IM.02.02.01","ep":"EP 2","question":"How do you use standardized terminology, definitions, abbreviations, acronyms, symbols, and dose designations?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Approved abbreviations list; training materials; EMR configuration","role":"Clinical Leadership / HIM","where_verified":"Policy; EMR; Training Records","common_findings":"Use of nonstandard or prohibited abbreviations","risk_level":"High","corrective_action":"Reinforce prohibited list; audit records; retrain staff"},{"standard":"IM.02.02.01","ep":"EP 3","question":"How do you ensure the prohibited abbreviations list is followed in all documentation?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Audit results; corrective actions; EMR hard-stops","role":"Clinical Leadership / HIM","where_verified":"EMR; Audit Logs","common_findings":"Trailing zeros or prohibited abbreviations found","risk_level":"High","corrective_action":"Implement EMR controls; audit routinely; enforce compliance"},{"standard":"IM.02.02.03","ep":"EP 2","question":"How do storage and retrieval systems ensure information is accessible when needed for care?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"System availability metrics; retrieval procedures; downtime access methods","role":"IT / HIM","where_verified":"Logs; Staff Interview","common_findings":"Delays accessing records; staff unsure of retrieval process","risk_level":"High","corrective_action":"Improve retrieval processes; train staff; test access regularly"},{"standard":"IM.02.02.03","ep":"EP 3","question":"How do you disseminate data and information in useful formats within defined time frames?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Report schedules; distribution lists; turnaround time metrics","role":"Leadership / IT","where_verified":"Records; Reports","common_findings":"Reports late or unusable","risk_level":"Moderate","corrective_action":"Define formats/timeframes; monitor compliance; improve report design"},{"standard":"IM.02.02.03","ep":"EP 12","question":"How do you retain data and information for time frames consistent with law and regulation?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Retention policy; retention schedules; audit results","role":"HIM / Compliance","where_verified":"Policy; Records","common_findings":"Records destroyed too early or retained too long","risk_level":"High","corrective_action":"Align retention with law; audit and correct retention practices"},{"standard":"IM.03.01.01","ep":"EP 1","question":"How do staff access knowledge-based information resources, and how do you ensure resources are current and authoritative?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Clinical references; subscriptions; access logs; update review records","role":"Clinical Leadership / IT","where_verified":"Policy; Staff Interview","common_findings":"Outdated references; staff unaware of resources","risk_level":"Moderate","corrective_action":"Update resources; train staff; review annually"}]},"IPC":{"name":"Infection Prevention & Control","questions":[{"standard":"IC.04.01.01","ep":"EP 3","question":"How do your infection prevention and control policies align with applicable law, CDC guidance, and standard precautions, and how do staff apply them in daily practice?","criteria":"0=No IPC policies; 1=Policies exist but not aligned or not followed; 2=Policies aligned with minor gaps; 3=Policies aligned, implemented, and staff demonstrate consistent practice","evidence":"IPC Plan; CDC-aligned policies; standard precautions procedures","role":"IPC Lead / DON","where_verified":"Policy; Staff Interview","common_findings":"Policies reference CDC but staff cannot explain standard precautions","risk_level":"High","corrective_action":"Update IPC policies; retrain staff; validate implementation","section":"JC IPC Standards"},{"standard":"IC.04.01.01","ep":"EP 9","question":"How do you ensure staff have adequate supplies to support infection prevention and control activities at all times, including in communal, residential, and high-exposure settings such as detox or withdrawal management units?","criteria":"0=Supplies unavailable or inaccessible; 1=Supplies inconsistently available or not accessible at point of care; 2=Supplies available in most areas with minor gaps (e.g., missing in group rooms or communal spaces); 3=ABHR, soap, PPE, and cleaning/disinfection supplies consistently available and accessible at all points of care including communal areas, residential units, and high-acuity settings; monitored regularly","evidence":"Supply inventory logs; PPE stock records; hand hygiene station checks in group rooms, residential hallways, nursing stations, and detox units; supply par-level monitoring process","role":"Leadership / Facilities","where_verified":"Environment; Logs","common_findings":"ABHR absent from group therapy rooms or common areas; PPE unavailable in detox/withdrawal units; no process to monitor supply levels between formal inventory cycles","risk_level":"Moderate","corrective_action":"Map all points of care and install ABHR/soap at each; establish par-level monitoring for PPE and cleaning supplies; assign supply accountability by unit/program area","section":"JC IPC Standards"},{"standard":"IC.06.01.01","ep":"EP 1","question":"How do you identify and prioritize infection risks based on the care, treatment, and services you provide and on relevant issues identified by local, state, or federal public health authorities, including organism-specific risks relevant to your population (e.g., norovirus, RSV, influenza, COVID-19)?","criteria":"0=No risk identification process; 1=Generic risk list not tailored to services provided or setting; 2=Service-specific risk assessment that identifies named organisms and setting factors but lacks prioritization or public health linkage; 3=Documented risk assessment tailored to services and setting, addresses named organisms (norovirus, RSV, influenza, COVID-19 and others relevant to BH populations), incorporates local/state DOH public health alerts, and is used to allocate IPC resources","evidence":"Risk assessment document naming organism-specific risks; evidence of DOH alert review (e.g., email/log of public health notifications); service-specific risk matrix; documentation that norovirus, RSV, influenza, and COVID-19 risks are addressed for communal/residential settings as applicable","role":"IPC Lead / QI","where_verified":"Policy; Logs","common_findings":"Risk assessment is a generic template not customized to BH setting; named organisms (norovirus, RSV, influenza, COVID-19) not addressed despite group-based or residential services; no evidence of public health alert review or integration into IPC priorities","risk_level":"High","corrective_action":"Revise risk assessment to be service-specific; add organism-specific risk analysis for norovirus, RSV, influenza, and COVID-19 relevant to setting type (outpatient, IOP/PHP, residential, detox); establish process to review and document DOH public health alerts; link risk findings to resource allocation decisions","section":"JC IPC Standards"},{"standard":"IC.06.01.01","ep":"EP 2","question":"How often do you review infection risks and respond to outbreaks or public health alerts?","criteria":"0=No review; 1=Sporadic review; 2=Annual review without action; 3=Annual and event-driven review with action","evidence":"Annual IPC review; outbreak meeting notes","role":"IPC Lead / QI","where_verified":"Logs; Staff Interview","common_findings":"No evidence of response to changing risks","risk_level":"High","corrective_action":"Document review cycle and action steps","section":"JC IPC Standards"},{"standard":"IC.06.01.01","ep":"EP 3","question":"How do staff implement standard precautions in daily care and services, including hand hygiene, PPE use, environmental cleaning, safe injection practices (if applicable), and respiratory hygiene, in a manner appropriate to the behavioral health setting?","criteria":"0=Standard precautions not implemented; no training or policy; 1=Training exists but inconsistently applied; staff cannot demonstrate key elements; 2=Standard precautions mostly implemented; gaps in one area (e.g., hand hygiene technique, inconsistent PPE use in high-exposure situations); 3=Standard precautions consistently implemented across all applicable elements \u2014 hand hygiene, PPE selection and use, environmental cleaning/disinfection, respiratory hygiene, and safe injection practices (where applicable); validated through observation and competency review","evidence":"Staff training/competency records for standard precautions; observation audit results; hand hygiene compliance data; PPE use logs in applicable settings; CDC Core Practices alignment documentation; respiratory hygiene signage; injection safety policy if injections administered","role":"DON / Clinical Director","where_verified":"Policy; Staff Interview; Environment; Training Records\nNote: Hand hygiene is the single most impactful element \u2014 align with CDC Core IPC Practices (https://www.cdc.gov/infection-control/hcp/core-practices/)","common_findings":"Staff unable to explain when PPE is required; hand hygiene skipped between client contacts in group or residential settings; no respiratory hygiene protocol; safe injection policy absent in programs administering medications (e.g., MAT/MOUD); cleaning products used without regard to contact time","risk_level":"High","corrective_action":"Retrain all direct-care staff on standard precautions using CDC Core Practices framework; conduct post-training competency validation; implement observation audits; establish respiratory hygiene signage in waiting and group areas; review injection safety practices if applicable to program","section":"JC IPC Standards"},{"standard":"IC.06.01.01","ep":"EP 6","question":"How do you respond when infection control issues or nonadherence are identified?","criteria":"0=No response; 1=Informal response; 2=Action plan without evaluation; 3=Action plan evaluated and revised","evidence":"Incident reports; action plans; follow-up reviews","role":"IPC Lead / QI","where_verified":"Logs","common_findings":"Action plans not evaluated","risk_level":"High","corrective_action":"Implement action plan tracking","section":"JC IPC Standards"},{"standard":"IC.06.01.01","ep":"EP 8","question":"How do staff handle, store, process, and transport linens in accordance with local or state regulations to prevent infection spread in residential or clinical settings?","criteria":"0=No linen handling process; contaminated and clean linens not separated; 1=Policy exists but not followed; linens sorted or rinsed in resident/patient areas; 2=Most linen procedures followed; minor gaps in documentation or storage separation; 3=Contaminated linens bagged at point of use, transported in leak-resistant containers, clean/soiled linen storage separated, laundered per state/local regulations; mattress and pillow covers inspected and replaced when damaged; documented compliance","evidence":"Linen handling policy referencing applicable state/local regulations; linen transport and storage procedures; mattress/pillow inspection log; laundry process documentation (temperature or chemical disinfection); training records for housekeeping and direct-care staff\nCross-ref: Environmental IC Questions sheet \u2192 Textile & Laundry (IC.04.01.01 EP 6) for CDC 2003 laundry temperature and handling detail","role":"Facilities / DON","where_verified":"Environment; Staff Interview","common_findings":"Soiled linens sorted or rinsed in resident rooms; no separation of clean and soiled linen storage; mattress covers with visible tears in use; no state/local regulatory reference in linen policy; housekeeping staff untrained on linen transport procedures","risk_level":"Moderate","corrective_action":"Update linen policy to cite applicable state/local regulations; enforce point-of-use bagging; establish clean/soiled storage separation; implement mattress inspection checklist; train housekeeping and residential staff; see Environmental IC Questions sheet for CDC 2003 technical laundry standards","section":"JC IPC Standards"},{"standard":"IC.04.01.01","ep":"EP 3","question":"How do staff demonstrate knowledge of hand hygiene indications, including when to use alcohol-based hand rub versus soap and water, consistent with CDC hand hygiene guidelines?","criteria":"0=Staff unable to describe any indications; 1=Staff can name some indications but cannot differentiate products; 2=Staff demonstrate partial knowledge with minor gaps; 3=Staff consistently and correctly identify all indications and select appropriate product","evidence":"Hand hygiene policy; CDC-based training records; staff competency assessments","role":"IPC Lead / DON / Education","where_verified":"Staff Interview; Direct Observation","common_findings":"Staff cannot explain when alcohol-based rub is insufficient (e.g., C. difficile, visibly soiled hands)","risk_level":"High","corrective_action":"Provide targeted hand hygiene education using CDC Guideline for Hand Hygiene; validate competencies through return demonstration","section":"Hand Hygiene"},{"standard":"IC.04.01.01","ep":"EP 9","question":"How does the organization ensure alcohol-based hand rub dispensers and soap/water stations are accessible, functional, and stocked at all patient care locations?","criteria":"0=Dispensers absent or non-functional; 1=Dispensers present but frequently empty or blocked; 2=Dispensers available with minor gaps in stocking or placement; 3=Dispensers consistently stocked, functional, and placed per CDC guidance at point of care","evidence":"Dispenser inspection logs; supply inventories; environmental rounds documentation","role":"Facilities / Leadership","where_verified":"Environment; Logs","common_findings":"Dispensers non-functional or delivering suboptimal product volume; empty soap stations near patient areas","risk_level":"High","corrective_action":"Implement weekly dispenser audits; establish par-level supply monitoring; review dispenser placement against CDC point-of-care guidance","section":"Hand Hygiene"},{"standard":"IC.06.01.01","ep":"EP 1","question":"How does the organization assess hand hygiene compliance rates and use that data to identify high-risk areas or staff groups needing targeted intervention?","criteria":"0=No hand hygiene monitoring conducted; 1=Monitoring occurs but data not analyzed; 2=Data collected and reviewed but not used to drive interventions; 3=Data systematically analyzed, trended, and used to guide targeted improvement activities","evidence":"Hand hygiene audit tools; compliance rate reports; improvement action plans","role":"IPC Lead / QI","where_verified":"Logs; Meeting Minutes","common_findings":"Hand hygiene compliance data collected but never reviewed at leadership level; no unit-level feedback provided to staff","risk_level":"High","corrective_action":"Establish regular hand hygiene audit cycle; report unit-level compliance data to staff and leadership quarterly; link findings to PI plan","section":"Hand Hygiene"},{"standard":"IC.06.01.01","ep":"EP 2","question":"How does the organization monitor and respond to changes in hand hygiene compliance, including during periods of increased infection risk, outbreaks, or staffing challenges?","criteria":"0=No response to compliance changes; 1=Informal, reactive response only; 2=Response occurs but is not documented or evaluated; 3=Systematic event-driven review with documented corrective action and evaluation of effectiveness","evidence":"Outbreak response records; staff communication logs; corrective action documentation","role":"IPC Lead / QI / Leadership","where_verified":"Logs; Staff Interview","common_findings":"No documented increase in hand hygiene monitoring during outbreak investigations; compliance drops during high-census periods go unaddressed","risk_level":"High","corrective_action":"Develop outbreak-specific hand hygiene escalation protocol; increase monitoring frequency during high-risk periods; document and evaluate corrective actions","section":"Hand Hygiene"},{"standard":"IC.06.01.01","ep":"EP 3","question":"How do staff perform hand hygiene technique correctly, including covering all hand surfaces, using adequate product volume, and rubbing until dry when using alcohol-based hand rub?","criteria":"0=Technique not observed or grossly incorrect; 1=Partial technique with significant steps omitted; 2=Technique mostly correct with minor omissions; 3=Correct technique consistently demonstrated per CDC guidelines (all surfaces covered, adequate volume, rubbing until dry)","evidence":"Direct observation records; competency checklists; return demonstration documentation","role":"DON / Clinical Director / Education","where_verified":"Direct Observation; Staff Interview","common_findings":"Staff apply insufficient volume of hand rub; hands not rubbed until dry; not all surfaces covered during handwashing","risk_level":"High","corrective_action":"Conduct hands-on hand hygiene technique training; use glow-germ or UV light demonstration; re-audit within 30 days","section":"Hand Hygiene"},{"standard":"IC.06.01.01","ep":"EP 6","question":"How does the organization identify and address barriers to hand hygiene adherence, such as product irritancy, inaccessibility of supplies, or high patient care workload?","criteria":"0=No barrier assessment conducted; 1=Barriers identified informally but not addressed; 2=Barriers identified and partially addressed; 3=Systematic barrier assessment with documented corrective actions and evidence of improvement","evidence":"Staff survey results; skin care product availability logs; workload and staffing reports; product tolerance assessments","role":"IPC Lead / HR / Facilities","where_verified":"Policy; Staff Interview; Logs","common_findings":"Staff report hand product irritancy but no alternative product offered; no skin care lotion available; sinks located far from patient areas","risk_level":"Moderate","corrective_action":"Conduct barrier survey; provide emollient-containing hand rub per CDC recommendations; evaluate dispenser placement; offer hand lotion program","section":"Hand Hygiene"},{"standard":"IC.06.01.01","ep":"EP 8","question":"How does the organization address glove use in relation to hand hygiene, including ensuring staff perform hand hygiene after glove removal and do not substitute gloves for hand hygiene?","criteria":"0=Staff routinely substitute gloves for hand hygiene; 1=Policy exists but staff do not consistently decontaminate hands after glove removal; 2=Hand hygiene after glove removal mostly observed with isolated gaps; 3=Staff consistently perform hand hygiene after glove removal and understand gloves do not replace hand hygiene","evidence":"Glove use and hand hygiene observation records; training documentation; policy","role":"DON / IPC Lead","where_verified":"Direct Observation; Staff Interview","common_findings":"Staff move between patients wearing same gloves; hand hygiene not performed after glove removal; staff believe gloves eliminate need for hand hygiene","risk_level":"High","corrective_action":"Retrain staff on glove vs. hand hygiene distinction; include in new hire orientation; observe and document compliance improvement","section":"Hand Hygiene"},{"standard":"IC.06.01.01","ep":"EP 3","question":"How does the organization address fingernail length and artificial nail policies for staff providing direct patient care, consistent with CDC hand hygiene guidance?","criteria":"0=No policy exists; 1=Policy exists but not enforced; 2=Policy enforced with occasional lapses; 3=Policy consistently enforced, documented, and staff demonstrate compliance with nail length and artificial nail restrictions","evidence":"Nail hygiene policy; competency documentation; personnel file notations for corrective actions","role":"HR / DON / IPC Lead","where_verified":"Policy; Direct Observation","common_findings":"Staff wearing artificial nails or nail extenders in direct care roles; no documented policy enforcement","risk_level":"Moderate","corrective_action":"Update and communicate nail hygiene policy; add to annual competency review; conduct spot audits and document corrective action","section":"Hand Hygiene"},{"standard":"IC.06.01.01","ep":"EP 1","question":"How does the organization use a multimodal strategy to promote and sustain hand hygiene improvement, including education, performance feedback, administrative support, and environmental controls?","criteria":"0=No organized hand hygiene program; 1=Single-strategy approach (e.g., posters only); 2=Two or more strategies used but not coordinated or sustained; 3=Documented multimodal program with education, feedback, leadership support, accessible products, and measured outcomes per CDC recommendations","evidence":"Hand hygiene program plan; audit data trends; feedback reports to staff/leadership; meeting minutes showing administrative support","role":"IPC Lead / Leadership / QI","where_verified":"Policy; Logs; Meeting Minutes","common_findings":"Hand hygiene program limited to annual in-service with no ongoing monitoring, feedback, or environmental component","risk_level":"High","corrective_action":"Develop or update comprehensive hand hygiene program using CDC multimodal strategy framework; assign ownership; set measurable targets; report progress quarterly","section":"Hand Hygiene"},{"standard":"IC.06.01.01","ep":"EP 2","question":"How does the organization manage hand hygiene for staff with confirmed or suspected exposure to spore-forming organisms (e.g., C. difficile), ensuring soap and water is used instead of alcohol-based hand rub in these situations?","criteria":"0=No distinction made; alcohol rub used in all situations including C. difficile exposure; 1=Policy exists but staff unaware of the distinction; 2=Staff aware but inconsistently apply soap/water in spore-forming outbreak situations; 3=Staff consistently and correctly use soap and water when indicated for spore-forming organisms per CDC guidance","evidence":"C. difficile management policy; outbreak response protocols; staff training records","role":"IPC Lead / DON","where_verified":"Policy; Staff Interview; Logs","common_findings":"Alcohol-based hand rub used as sole hand hygiene method during C. difficile outbreak; staff unaware that alcohol does not inactivate spores","risk_level":"High","corrective_action":"Update hand hygiene policy to include spore-forming pathogen exceptions; retrain staff; post visual cues in applicable patient care areas","section":"Hand Hygiene"},{"standard":"IC.02.01.01","ep":"EP 1","question":"How does your facility ensure that HVAC systems in patient-care areas are maintained, monitored, and functioning according to AIA/ASHRAE standards, including proper air changes per hour, pressure differentials, and filtration?","criteria":"0=No HVAC monitoring; 1=Monitoring exists but incomplete or undocumented; 2=Most parameters monitored with minor documentation gaps; 3=HVAC fully monitored, documented, and maintained per AIA/ASHRAE standards with corrective action processes in place","evidence":"HVAC maintenance logs; pressure differential records; ACH documentation; filter change logs; facility engineer reports","role":"Facilities / IPC Lead","where_verified":"Logs; Environment","common_findings":"No documented pressure differential monitoring; filters overdue for replacement; no ACH documentation for AII or PE rooms","risk_level":"High","corrective_action":"Implement HVAC monitoring schedule per AIA standards; document ACH, pressure differentials, and filter changes; assign facilities engineer accountability","section":"Environmental IC"},{"standard":"IC.02.01.01","ep":"EP 2","question":"How does your facility conduct an Infection Control Risk Assessment (ICRA) prior to construction, renovation, or demolition projects, and what infection control measures are implemented during these activities to protect immunocompromised patients?","criteria":"0=No ICRA process; 1=ICRA performed but not followed or incomplete; 2=ICRA performed for most projects with some control gaps; 3=ICRA consistently performed pre-project, multidisciplinary team involved, barriers/controls in place and monitored","evidence":"ICRA documentation; construction contracts with IC clauses; barrier inspection logs; patient relocation records; multidisciplinary team minutes","role":"IPC Lead / Facilities","where_verified":"Policy; Logs; Environment","common_findings":"Construction begins without ICRA; no dust barriers or negative pressure in work zones adjacent to patient care; no surveillance for aspergillosis during projects","risk_level":"High","corrective_action":"Establish ICRA policy requiring pre-project assessment; include IC requirements in construction contracts with penalty clauses; implement barrier monitoring and fungal surveillance","section":"Environmental IC"},{"standard":"IC.02.01.01","ep":"EP 3","question":"How does your facility maintain water temperature controls, perform water system maintenance, and monitor for Legionella and other waterborne pathogens, particularly in areas housing immunocompromised patients?","criteria":"0=No water management program; 1=Temperature monitoring only, no Legionella plan; 2=Water management plan exists with some monitoring gaps; 3=Comprehensive water management plan with documented hot/cold temperature monitoring, Legionella surveillance, cooling tower maintenance, and response protocols","evidence":"Water management plan; hot/cold temperature logs; Legionella testing records; cooling tower maintenance logs; decontamination records","role":"Facilities / IPC Lead","where_verified":"Policy; Logs","common_findings":"No documented water temperature monitoring; no Legionella surveillance plan; cooling towers lack drift eliminators or biocide treatment records","risk_level":"High","corrective_action":"Implement CDC/ASHRAE-compliant water management plan; document temperature monitoring \u2265124\u00b0F return; establish Legionella surveillance; maintain cooling tower per ASHRAE 12:2000","section":"Environmental IC"},{"standard":"IC.04.01.01","ep":"EP 1","question":"How does your facility select, use, and ensure staff compliance with EPA-registered disinfectants for environmental surface cleaning in patient-care areas, including high-touch surfaces and special pathogen situations (e.g., C. difficile)?","criteria":"0=No EPA-registered products used; no product selection process; 1=EPA products available but staff do not follow label instructions or contact times; 2=EPA products used correctly in most areas with minor compliance gaps; 3=EPA-registered products selected for specific organisms, used per label instructions with documented compliance and staff education","evidence":"Disinfectant product list; EPA registration documentation; staff training records; cleaning competency logs; C. difficile protocol","role":"IPC Lead / EVS Supervisor","where_verified":"Policy; Staff Interview; Environment","common_findings":"Non-EPA-registered products in use; staff unaware of contact times; alcohol used for large surface disinfection; no sporicidal product for C. difficile rooms","risk_level":"High","corrective_action":"Standardize EPA-registered product formulary; train EVS and clinical staff on product selection and contact times; implement sporicidal protocol for C. difficile per EPA List K","section":"Environmental IC"},{"standard":"IC.04.01.01","ep":"EP 3","question":"How does your environmental services program ensure consistent cleaning and disinfection of high-touch surfaces, blood/body fluid spills, and patient-care equipment, including frequency, technique, and documentation?","criteria":"0=No structured cleaning program; 1=Cleaning performed but no documentation or inconsistent frequency; 2=Cleaning program exists with most elements in place but documentation gaps or inconsistent high-touch focus; 3=Documented cleaning program with defined frequency for high-touch surfaces, spill protocol, trained EVS staff, and auditing of compliance","evidence":"Cleaning and disinfection policy; EVS cleaning logs; spill response documentation; staff training records; environmental rounds data","role":"EVS Supervisor / IPC Lead","where_verified":"Policy; Logs; Environment; Staff Interview","common_findings":"High-touch surfaces (bed rails, doorknobs, commodes) cleaned at same frequency as low-touch; no spill response log; mop heads not changed between rooms or daily","risk_level":"High","corrective_action":"Revise cleaning schedule to increase high-touch surface frequency; implement spill response protocol; establish mop and cloth change policy per CDC Category II guidance","section":"Environmental IC"},{"standard":"IC.04.01.01","ep":"EP 6","question":"How does your facility manage textiles, laundry, mattresses, and pillows to prevent transmission of infectious agents, including handling procedures, laundry temperature requirements, and mattress/pillow integrity checks?","criteria":"0=No laundry or textile management policy; 1=Policy exists but not followed; laundry bagging or temperature requirements unmet; 2=Most laundry procedures followed with some gaps in mattress/pillow integrity or temperature documentation; 3=Contaminated textiles bagged at point of use, hot-water laundry \u2265160\u00b0F for \u226525 min, mattress/pillow covers inspected and replaced when damaged, all per AIA/OSHA standards","evidence":"Laundry policy; water temperature logs; mattress inspection records; linen handling training records; laundry facility maintenance logs","role":"EVS Supervisor / Facilities","where_verified":"Policy; Logs; Environment","common_findings":"Contaminated linen sorted in patient rooms; no laundry water temperature documentation; mattress covers with visible tears not removed from service","risk_level":"Moderate","corrective_action":"Enforce point-of-use bagging of soiled linen per OSHA; document laundry cycle temperatures; implement mattress inspection program with replacement criteria","section":"Environmental IC"},{"standard":"IC.06.01.01","ep":"EP 1","question":"How does your facility monitor and respond to healthcare-associated Legionnaires disease, including laboratory diagnostic capacity, clinician awareness, case reporting, and water system decontamination protocols when cases are identified?","criteria":"0=No Legionella surveillance or response plan; 1=Awareness exists but no formal surveillance or diagnostic protocol; 2=Surveillance in place with diagnostic capacity, but response protocol incomplete; 3=Active Legionella surveillance, laboratory diagnostic tests available, clinician education in place, documented response protocol including water decontamination when cases identified","evidence":"Legionella surveillance policy; laboratory test capability documentation; clinician education records; case investigation reports; water decontamination records","role":"IPC Lead / Medical Director","where_verified":"Policy; Logs; Staff Interview","common_findings":"No Legionella surveillance program; clinicians unaware of diagnostic testing options; no water decontamination protocol; cases not being reported to health department","risk_level":"High","corrective_action":"Establish Legionella surveillance per CDC Category IA guidance; ensure urine antigen testing availability; educate clinicians; create outbreak response protocol with mandatory reporting","section":"Environmental IC"},{"standard":"IC.06.01.01","ep":"EP 2","question":"How does your facility protect immunocompromised patients housed in Protective Environments (PE), including room pressure monitoring, HEPA filtration, ACH requirements, construction activity restrictions, and limitations on plant/flower exposure?","criteria":"0=No PE protocols; positive pressure not maintained; 1=PE designation exists but room parameters not monitored or plants/flowers not restricted; 2=Most PE requirements met but daily pressure monitoring or HEPA documentation incomplete; 3=PE rooms maintain \u226512 ACH positive pressure, daily documented pressure monitoring, HEPA-filtered air, no plants/flowers, patients protected during construction, and all per AIA Category IB/IC standards","evidence":"PE room monitoring logs; pressure differential records; HEPA filter maintenance logs; patient placement policy; construction ICRA for PE proximity; flower/plant restriction policy","role":"IPC Lead / Facilities / Nursing","where_verified":"Policy; Logs; Environment","common_findings":"PE room pressure not monitored daily; plants present in immunocompromised patient rooms; no HEPA filter maintenance documentation; windows opened in PE units","risk_level":"High","corrective_action":"Implement daily PE pressure differential monitoring with documentation; prohibit plants/flowers in immunocompromised patient areas; verify HEPA filter function and document; seal PE room windows","section":"Environmental IC"},{"standard":"IC.06.01.01","ep":"EP 3","question":"How does your facility manage ice machines, ice handling practices, and hydrotherapy equipment to prevent waterborne pathogen transmission, including cleaning schedules, scoop storage, and patient risk assessment before pool use?","criteria":"0=No ice or hydrotherapy hygiene protocols; 1=Basic protocols exist but ice scoop stored improperly or hydrotherapy equipment not disinfected between patients; 2=Most practices in place with minor gaps in documentation or equipment cleaning; 3=Ice dispensed with smooth-surface scoop stored off the bin, machines cleaned per manufacturer instructions, hydrotherapy tanks drained and disinfected after each patient with EPA-registered product, documented patient risk assessment for pool use","evidence":"Ice machine cleaning log; hydrotherapy cleaning/disinfection records; patient risk assessment records for pool use; staff training documentation","role":"EVS Supervisor / Rehab / Nutrition","where_verified":"Policy; Logs; Environment; Staff Interview","common_findings":"Ice scoop stored in ice bin; ice machine never cleaned; hydrotherapy tank not disinfected between patients; no patient risk assessment for pool use","risk_level":"Moderate","corrective_action":"Relocate ice scoop per CDC Category II; establish ice machine cleaning schedule per manufacturer; implement post-patient hydrotherapy disinfection protocol with EPA product; create pool risk assessment tool","section":"Environmental IC"},{"standard":"IC.06.01.01","ep":"EP 6","question":"How does your facility manage regulated medical waste, including sharps disposal, containment and labeling of infectious waste, staff training on hazards, and compliance with federal, state, and OSHA regulations for medical waste handling and disposal?","criteria":"0=No regulated waste management policy; sharps not in puncture-resistant containers; 1=Policy exists but sharps containers overfilled, waste not labeled, or staff untrained; 2=Most waste management requirements met with occasional non-compliance or documentation gaps; 3=Sharps in puncture-resistant containers at point of use, infectious waste bagged and labeled at point of origin, staff trained on hazards, disposal plan documented and compliant with OSHA 29 CFR 1910.1030 and state regulations","evidence":"Regulated waste disposal plan; sharps container placement records; staff training logs; waste disposal manifests; OSHA compliance documentation","role":"IPC Lead / EVS Supervisor / Safety Officer","where_verified":"Policy; Logs; Environment; Staff Interview","common_findings":"Sharps containers overfilled or not at point of use; infectious waste bags unlabeled; staff cannot explain categories of regulated medical waste; no documented disposal plan","risk_level":"High","corrective_action":"Place sharps containers at point of use and establish fill-level monitoring; label all regulated waste per OSHA; conduct annual waste management training; document and implement compliant disposal plan","section":"Environmental IC"},{"standard":"IC.06.01.01","ep":"EP 1","question":"How does the organization comply with Florida mandatory communicable disease reporting requirements, including timely reporting to the County Health Department (CHD) and coordination with FDOH for outbreak investigation?","criteria":"0=No awareness of FL reporting requirements; no reports filed; 1=Staff aware of requirements but no documented reports or CHD contact process; 2=Reporting process exists with documentation gaps or delayed reports; 3=Documented process for identifying reportable conditions per F.S. 381.0031; timely reports filed to CHD; CHD contact log maintained; outbreak investigations coordinated with FDOH/CHD per FDOH HAI Investigation Guide","evidence":"FDOH communicable disease report logs; CHD contact records; outbreak investigation documentation; staff training on FL reportable conditions (FDOH Reporting FAQs and Case Definitions); FDOH case definition reference on file","role":"IPC Lead / Medical Director","where_verified":"Policy; Logs; Staff Interview\n\nFDOH Source: FDOH Week 2 \u2014 Surveillance & FDOH Reporting","common_findings":"No documented communicable disease reports filed with CHD; staff unaware of FL reporting requirements (F.S. 381.0031); no CHD contact during outbreak events; FDOH reportable conditions list not accessible to clinical staff","risk_level":"High","corrective_action":"Train staff on FL mandatory communicable disease reporting requirements; post FDOH reportable conditions list; establish CHD contact log; reference FDOH Reporting FAQs at fdoh.flhealth.gov","section":"FDOH Florida-Specific"},{"standard":"IC.06.01.01","ep":"EP 1","question":"How does the organization screen for, manage, and implement enhanced precautions for residents or clients with multidrug-resistant organisms (MDROs), including MRSA, VRE, CRE, and C. difficile, in residential or high-acuity BH settings?","criteria":"0=No MDRO awareness; no precautions in place; 1=Awareness exists but no screening process or contact precautions policy; 2=MDRO policy exists; contact precautions implemented inconsistently; enhanced cleaning not documented; 3=MDRO risk screening on admission for applicable settings; contact precautions implemented per CDC/FDOH guidelines; enhanced cleaning with EPA-registered product per CDC MDRO guidance; staff trained; FDOH AR Organism Guidelines referenced","evidence":"MDRO policy and procedure; admission screening criteria; contact precautions log; enhanced cleaning protocol referencing FDOH Guidelines for AR Organisms; staff training records on MDRO precautions; EPA product list for MDRO environments","role":"IPC Lead / DON / Clinical Director","where_verified":"Policy; Logs; Staff Interview; Environment\n\nFDOH Source: FDOH Weeks 5\u20137 \u2014 MDRO Management","common_findings":"No MDRO screening or admission risk assessment; contact precautions not implemented for known MDRO-positive residents; standard cleaning used without enhanced protocol for MDRO rooms; staff unfamiliar with FDOH AR Organism Guidelines","risk_level":"High","corrective_action":"Implement MDRO admission screening for residential/detox settings; establish contact precautions policy referencing FDOH Guidelines for Prevention and Control of Infections Due to Antibiotic-Resistant Organisms; train staff; implement enhanced cleaning protocol per CDC MDRO guidance","section":"FDOH Florida-Specific"},{"standard":"IC.04.01.01","ep":"EP 3","question":"If the organization prescribes or administers antibiotics, how does it implement antibiotic stewardship practices aligned with CDC Core Elements for outpatient or facility-based settings, including prescribing review, staff education, and patient/resident counseling on antibiotic use?","criteria":"0=No antibiotic stewardship awareness or program; 1=Antibiotic prescribing occurs but no stewardship practices in place; 2=Some stewardship elements present (e.g., prescribing guidelines) but no formal program or tracking; 3=Antibiotic stewardship program implemented per CDC Core Elements (commitment, action, tracking, reporting, education); FDOH TRAIN ASP course completed by relevant staff; antibiotic use data reviewed; patient/resident counseling documented (or N/A documented if no prescribing)","evidence":"Antibiotic stewardship policy; prescribing guidelines or formulary restrictions; FDOH TRAIN Antibiotic Stewardship Course completion records; antibiotic use data or pharmacy reports; patient counseling documentation; CDC Core Elements of Antibiotic Stewardship for applicable facility type on file","role":"Medical Director / Prescribing Staff / IPC Lead","where_verified":"Policy; Logs; Staff Interview\n\nFDOH Source: FDOH Week 8 \u2014 Antimicrobial Stewardship","common_findings":"Antibiotics prescribed without documented stewardship review; no FDOH TRAIN ASP course completion; no patient counseling on antibiotic use; no tracking of antibiotic prescribing patterns; CDC Core Elements not referenced in policy","risk_level":"Moderate","corrective_action":"Implement CDC Core Elements of Antibiotic Stewardship for applicable setting type; complete FDOH TRAIN Antibiotic Stewardship Course (Modules 1\u20136); establish prescribing review process; document patient counseling; if no antibiotic prescribing: document N/A with rationale","section":"FDOH Florida-Specific"},{"standard":"IC.06.01.01","ep":"EP 3","question":"How does the organization maintain staff immunization records, enforce work restriction policies for staff with communicable illness, and ensure staff are not working while infectious?","criteria":"0=No staff immunization or work restriction policy; 1=Policy exists but not enforced; no tracking of immunization status; 2=Immunization records maintained with some gaps; work restrictions applied inconsistently; 3=Staff immunization records current and complete per CDC healthcare personnel vaccination recommendations; documented work restriction policy for communicable illness (influenza, GI illness, skin infections, etc.); staff aware of policy; return-to-work criteria defined and followed","evidence":"Staff immunization records (influenza, hepatitis B, MMR, Tdap, COVID-19 as applicable); work restriction policy with return-to-work criteria; staff illness reporting log; CDC Infection Control in Health Care Personnel guidelines referenced in policy","role":"HR / DON / Occupational Health","where_verified":"Policy; Personnel Records; Logs; Staff Interview\n\nFDOH Source: FDOH Week 9 \u2014 Occupational Health (Staff Immunization & Work Restrictions)","common_findings":"Immunization records incomplete or not maintained; staff working while symptomatic with no formal restriction process; no documented return-to-work criteria; influenza vaccination declination not documented","risk_level":"High","corrective_action":"Establish and enforce staff immunization policy per CDC healthcare personnel vaccination recommendations; implement work restriction policy with clear return-to-work criteria; train supervisors on enforcement; reference CDC Infrastructure and Routine Practices for Occupational Health","section":"FDOH Florida-Specific"},{"standard":"IC.06.01.01","ep":"EP 3","question":"How does the organization comply with OSHA Bloodborne Pathogens Standard (29 CFR 1910.1030), including an exposure control plan, staff training, post-exposure evaluation, and sharps injury documentation?","criteria":"0=No BBP exposure control plan; no post-exposure process; 1=Exposure control plan exists but not current or staff untrained; 2=BBP plan current; training documented with gaps; post-exposure process inconsistently followed; 3=Current OSHA-compliant BBP Exposure Control Plan reviewed annually; all at-risk staff trained within 10 days of hire and annually; post-exposure evaluation and follow-up documented; sharps injury log maintained; safer needle devices in use where feasible","evidence":"OSHA BBP Exposure Control Plan (current year); staff BBP training records; sharps injury log (OSHA 300 log if applicable); post-exposure protocol; safer needle/sharps device documentation; hepatitis B vaccination records or declination for at-risk staff","role":"Safety Officer / HR / DON","where_verified":"Policy; Logs; Personnel Records; Staff Interview\n\nFDOH Source: FDOH Week 9 \u2014 Occupational Health (Bloodborne Pathogen Exposure)","common_findings":"BBP Exposure Control Plan outdated or not reviewed annually; at-risk staff not trained on BBP within required timeframe; post-exposure incidents not documented or followed up; sharps injury log not maintained; hepatitis B vaccination not offered to at-risk staff","risk_level":"High","corrective_action":"Update BBP Exposure Control Plan annually per OSHA 29 CFR 1910.1030; conduct BBP training for all at-risk staff; establish sharps injury log; implement post-exposure evaluation protocol; offer hepatitis B vaccination to all at-risk staff","section":"FDOH Florida-Specific"},{"standard":"IC.06.01.01","ep":"EP 2","question":"How does the organization maintain an IPC component within its emergency preparedness and disaster response plan, including infection risk management during facility closure, evacuation, or post-disaster operations, with attention to Florida-specific hazards such as hurricanes?","criteria":"0=No IPC component in emergency plan; 1=Emergency plan exists but no IPC-specific procedures; 2=IPC included in emergency plan with some procedures; coordination with FDOH/CHD not documented; 3=Emergency plan includes IPC-specific protocols for continuity of infection control during disasters (supply access, isolation capability, hand hygiene alternatives); FDOH Health Care System Preparedness requirements addressed; hurricane-specific plan for FL facilities; post-disaster environmental assessment process defined","evidence":"Emergency/disaster plan with IPC section; hurricane preparedness protocol (FL facilities); FDOH Health Care System Preparedness documentation; APIC Hurricane and Disaster Resources reference on file; supply contingency plan (PPE, hand hygiene, disinfectants); staff training on emergency IPC procedures","role":"IPC Lead / Administration / Emergency Coordinator","where_verified":"Policy; Plan Documents; Staff Interview\n\nFDOH Source: FDOH Week 11 \u2014 Emergency/Disaster IPC (Florida-specific: Hurricane Preparedness)","common_findings":"Emergency plan has no IPC section; no hurricane-specific IPC protocol for FL facility; supply contingency plan absent; staff untrained on IPC during disaster scenarios; no post-disaster environmental assessment process","risk_level":"High","corrective_action":"Add IPC section to emergency/disaster plan; develop hurricane-specific IPC protocol for FL facilities per FDOH Health Care System Preparedness; reference APIC Hurricane and Disaster Resources and CDC Infectious Disease After a Disaster; include supply contingency and post-disaster environmental assessment procedures","section":"FDOH Florida-Specific"}]},"LD":{"name":"Leadership","questions":[{"standard":"LD.01.01.01","ep":"EP 1","question":"How does the organization identify those responsible for governance?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Bylaws; organizational chart; governing body roster","role":"Governance / CEO","where_verified":"Policy; Records","common_findings":"Governance roles unclear or outdated","risk_level":"High","corrective_action":"Update governance documentation and approve through board"},{"standard":"LD.01.03.01","ep":"EP 1","question":"How does governance define its responsibilities for safety and quality in writing?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Board bylaws; charters; meeting minutes","role":"Governance","where_verified":"Policy; Board Minutes","common_findings":"Responsibilities not clearly documented","risk_level":"High","corrective_action":"Revise bylaws and formally approve"},{"standard":"LD.01.04.01","ep":"EP 1","question":"How does the chief executive ensure adequate resources for safe, quality care?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Budget; staffing plans; resource allocation records","role":"CEO / CFO","where_verified":"Records; Interviews","common_findings":"Resources not aligned with risk areas","risk_level":"High","corrective_action":"Conduct resource gap analysis and adjust budget"},{"standard":"LD.01.07.01","ep":"EP 2","question":"How are leaders oriented to mission, safety goals, and applicable regulations?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Orientation materials; training logs","role":"HR / Leadership","where_verified":"Training Records","common_findings":"Leader orientation incomplete","risk_level":"Moderate","corrective_action":"Standardize leader orientation and track completion"},{"standard":"LD.02.01.01","ep":"EP 1","question":"How do leaders collaborate to develop and communicate the mission, vision, and goals?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Mission statement; staff communications","role":"Leadership","where_verified":"Policy; Interviews","common_findings":"Mission not communicated to staff","risk_level":"Moderate","corrective_action":"Re-communicate mission and assess understanding"},{"standard":"LD.03.01.01","ep":"EP 1","question":"How do leaders evaluate the culture of safety and quality?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Culture surveys; action plans","role":"QI / Leadership","where_verified":"Records; PI Reports","common_findings":"No formal culture evaluation","risk_level":"High","corrective_action":"Implement annual culture assessment"},{"standard":"LD.03.09.01","ep":"EP 1","question":"How is the organizationwide safety program structured and managed?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Safety program plan; incident reporting system","role":"Safety Officer / QI","where_verified":"Policy; Logs","common_findings":"Safety activities fragmented","risk_level":"High","corrective_action":"Integrate safety activities and assign oversight"},{"standard":"LD.04.01.01","ep":"EP 1","question":"How does the organization ensure compliance with applicable laws and regulations?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Licenses; regulatory tracking log","role":"Compliance Officer","where_verified":"Records","common_findings":"Licenses expired or not monitored","risk_level":"High","corrective_action":"Implement regulatory tracking system"},{"standard":"LD.04.02.01","ep":"EP 2","question":"How are conflicts of interest identified, disclosed, and managed?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Conflict of interest policy; disclosure forms","role":"Compliance / Governance","where_verified":"Policy; Records","common_findings":"Disclosures incomplete","risk_level":"Moderate","corrective_action":"Collect annual disclosures and review"},{"standard":"LD.04.03.09","ep":"EP 1","question":"How do leaders oversee care provided through contractual agreements?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Contracts; monitoring reports","role":"Leadership / Compliance","where_verified":"Contracts; Audits","common_findings":"Contract oversight inconsistent","risk_level":"High","corrective_action":"Standardize contract review and monitoring"}]},"LS":{"name":"Life Safety","questions":[{"standard":"LS.01.01.01","ep":"EP 1","question":"How does the organization maintain building systems to minimize the risk of failure that could affect safety?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Preventive maintenance plans; work orders; inspection logs","role":"Facilities / Safety Officer","where_verified":"Logs; Environment","common_findings":"PMs overdue or undocumented","risk_level":"High","corrective_action":"Implement PM schedule tracking and audit compliance"},{"standard":"LS.01.01.01","ep":"EP 2","question":"How do you identify and correct deficiencies in building systems that affect life safety?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Deficiency lists; corrective action logs; repair documentation","role":"Facilities","where_verified":"Logs; Environment","common_findings":"Deficiencies identified but not corrected","risk_level":"High","corrective_action":"Track deficiencies with timelines and accountability"},{"standard":"LS.02.01.10","ep":"EP 1","question":"How do you maintain fire detection and alarm systems in accordance with code?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Fire alarm inspection/testing reports","role":"Facilities","where_verified":"Logs; Environment","common_findings":"Inspection reports missing or outdated","risk_level":"High","corrective_action":"Schedule and document fire alarm inspections"},{"standard":"LS.02.01.10","ep":"EP 2","question":"How do you ensure staff know how to respond to fire alarms and fire emergencies?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Fire response training; drill records","role":"Safety Officer / HR","where_verified":"Training Records; Staff Interview","common_findings":"Staff unsure of fire response steps","risk_level":"High","corrective_action":"Reinforce fire response training and drills"},{"standard":"LS.02.01.20","ep":"EP 1","question":"How do you ensure corridors and exits remain free of obstructions?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Environment of Care rounds; corridor inspection logs","role":"Facilities / Safety Officer","where_verified":"Environment; Logs","common_findings":"Corridors cluttered or blocked","risk_level":"High","corrective_action":"Conduct regular rounds and remove obstructions"},{"standard":"LS.02.01.20","ep":"EP 2","question":"How do you ensure doors and locking mechanisms operate as required for life safety?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Door inspection logs; maintenance records","role":"Facilities","where_verified":"Environment; Logs","common_findings":"Doors not latching or locking properly","risk_level":"High","corrective_action":"Inspect and repair doors per code"},{"standard":"LS.02.0 //  MULTI-TENANT STORE
//  Complete data isolation per tenant UUID
//  No tenant can access another tenant's data
// ═══════════════════════════════════════════════════════
const T={
  // Registry: only stores {id, email, org} — no passwords
  reg(){try{return JSON.parse(localStorage.getItem('mz_reg')||'[]')}catch{return[]}},
  setReg(r){localStorage.setItem('mz_reg',JSON.stringify(r))},
  k(id,key){return`mz_${id}_${key}`},  // isolated namespace

  register({org,email,pw,pid}){
    const r=this.reg();
    if(r.find(t=>t.email===email.toLowerCase()))
      return{err:'An account with this email already exists.'};
    // Generate UUID-like ID
    const id=Date.now().toString(36)+Math.random().toString(36).slice(2,8);
    const tenant={id,org,email:email.toLowerCase(),pid:pid||'millz',at:new Date().toISOString()};
    r.push({id,email:email.toLowerCase(),org});
    this.setReg(r);
    localStorage.setItem(this.k(id,'p'),JSON.stringify(tenant));
    // Store hashed password (base64 for demo; use bcrypt/Supabase Auth in prod)
    localStorage.setItem(this.k(id,'h'),btoa(unescape(encodeURIComponent(pw))));
    localStorage.setItem(this.k(id,'s'),'{}');
    return{tenant};
  },

  login({email,pw}){
    const e=this.reg().find(t=>t.email===email.toLowerCase());
    if(!e)return{err:'No account found with this email.'};
    const h=localStorage.getItem(this.k(e.id,'h'));
    if(h!==btoa(unescape(encodeURIComponent(pw))))return{err:'Incorrect password. Please try again.'};
    const tenant=JSON.parse(localStorage.getItem(this.k(e.id,'p'))||'null');
    return{tenant};
  },

  scores(id){try{return JSON.parse(localStorage.getItem(this.k(id,'s'))||'{}')}catch{return{}}},
  saveScores(id,sc){localStorage.setItem(this.k(id,'s'),JSON.stringify(sc))},

  updateProfile(id,u){
    const p=JSON.parse(localStorage.getItem(this.k(id,'p'))||'{}');
    const n={...p,...u};
    localStorage.setItem(this.k(id,'p'),JSON.stringify(n));
    const r=this.reg(),i=r.findIndex(t=>t.id===id);
    if(i!==-1){if(u.org)r[i].org=u.org;this.setReg(r);}
    return n;
  },

  sess(t){sessionStorage.setItem('mz_s',JSON.stringify(t))},
  getSess(){try{return JSON.parse(sessionStorage.getItem('mz_s')||'null')}catch{return null}},
  clrSess(){sessionStorage.removeItem('mz_s')},
};

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
function e(s=''){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function crit(txt=''){
  const p={};const re=/([0-3])\s*=\s*([^;0-3]{3,}?)(?=;\s*[0-3]=|$)/g;let m;
  while((m=re.exec(txt))!==null)p[+m[1]]=m[2].trim().replace(/;$/,'');
  return p;
}
function chStat(code,sc){
  const qs=SD[code].questions;
  const a=qs.map((_,i)=>sc[code+'_'+i]?.score).filter(s=>s!==undefined);
  return{a:a.length,t:qs.length,pct:a.length?Math.round(a.reduce((x,y)=>x+y,0)/(a.length*3)*100):0};
}
function totals(sc){
  let tq=0,ta=0,ts=0,ca=0;
  Object.keys(SD).forEach(c=>SD[c].questions.forEach((_,i)=>{
    tq++;const s=sc[c+'_'+i]?.score;
    if(s!==undefined){ta++;ts+=s;if(s<3)ca++;}
  }));
  return{tq,ta,pct:ta?Math.round(ts/(ta*3)*100):null,ca};
}
function applyPal(pid){
  const p=PAL[pid]||PAL.millz;
  const r=document.documentElement.style;
  r.setProperty('--P',p.P);r.setProperty('--P2',p.P2);
  r.setProperty('--BG',p.BG);r.setProperty('--IN',p.IN);r.setProperty('--LN',p.LN);
  // Surface always white, muted always mid-grey
  r.setProperty('--SF','#FFFFFF');r.setProperty('--MU','#8A8480');
}

            ${Object.values(PAL).map(p=>`
              <div class="pal-card${pid===p.id?' sel':''}" style="${pid===p.id?'border-color:'+p.P:''}"
                onclick="A._setPid='${p.id}';applyPal('${p.id}');document.getElementById('root').querySelector('.overlay').outerHTML=A.renderSettingsModal()">
                <div class="pal-swatches">${p.sw.map(c=>`<div class="swatch" style="background:${c}"></div>`).join('')}</div>
                <div class="pal-name">${p.name}</div>
                <div class="pal-desc">${p.desc}</div>
              </div>`).join('')}
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="A.cancelSettings()">Cancel</button>
          <button class="btn btn-primary" onclick="A.saveSettings()">Save Changes</button>
        </div>
      </div>
    </div>`;
  },

  cancelSettings(){
    applyPal(this.ten.pid||'millz');
    this.modal=null;this.render();
  },

  saveSettings(){
    const org=this._setOrg.trim()||this.ten.org;
    const pid=this._setPid||this.ten.pid||'millz';
    const updated=T.updateProfile(this.ten.id,{org,pid});
    T.sess(updated);this.ten=updated;
    applyPal(pid);this.modal=null;this.render();
  },

  // ──────────────────────────────────────────────
  //  ACTIONS
  // ──────────────────────────────────────────────
  go(v){this.view=v;this.render();window.scrollTo(0,0)},

  loadCh(code){
    this.ch=code;this.qi=0;this.view='survey';
    this.render();window.scrollTo(0,0);
    requestAnimationFrame(()=>{
      const el=document.querySelector('.ch-tab.on');
      if(el)el.scrollIntoView({inline:'center',behavior:'smooth'});
    });
  },

  pick(key,s){
    this.sc[key]={...this.sc[key],score:s};
    T.saveScores(this.ten.id,this.sc);
    // Surgical DOM update — no full re-render needed
    document.querySelectorAll('.opt').forEach((el,i)=>{
      el.className='opt'+(i===s?' v'+s:'');
    });
    const nb=document.querySelector('.btn-primary');
    if(nb)nb.disabled=false;
    // CA panel
    const qc=document.querySelector('.qcard');
    if(qc){
      let old=qc.querySelector('.ca-panel');if(old)old.remove();
      const q=SD[this.ch].questions[this.qi];
      if(s<3&&q.corrective_action&&q.corrective_action.trim()&&q.corrective_action!=='None'){
        const d=document.createElement('div');d.className='ca-panel';
        d.innerHTML=`<div class="ca-hd">⚠ Recommended Corrective Action</div><div class="ca-bd">${e(q.corrective_action)}</div>`;
        qc.appendChild(d);
      }
    }
  },

  saveNotes(key,notes){
    this.sc[key]={...this.sc[key],notes};
    T.saveScores(this.ten.id,this.sc);
  },

  next(){
    const ta=document.getElementById('nta');
    if(ta)this.saveNotes(this.ch+'_'+this.qi,ta.value);
    const t=SD[this.ch].questions.length;
    if(this.qi<t-1){this.qi++;this.render();window.scrollTo(0,0);}
    else{this.go('dashboard');}
  },

  prev(){
    const ta=document.getElementById('nta');
    if(ta)this.saveNotes(this.ch+'_'+this.qi,ta.value);
    if(this.qi>0){this.qi--;this.render();window.scrollTo(0,0);}
  },

  goQ(i){
    const ta=document.getElementById('nta');
    if(ta)this.saveNotes(this.ch+'_'+this.qi,ta.value);
    this.qi=i;this.render();window.scrollTo(0,0);
  },
};

A.boot();
</script>
</body>
</html>
