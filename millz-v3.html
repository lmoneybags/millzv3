<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Millz — Joint Commission Survey Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   MILLZ v3 — Multi-Tenant SaaS Design System
   Tenant-swappable via CSS custom properties
═══════════════════════════════════════════════ */
:root {
  --P:  #A899C2;  /* primary */
  --P2: #7A9BB5;  /* secondary */
  --BG: #F8F6F2;  /* page background */
  --SF: #FFFFFF;  /* surface / card */
  --IN: #3A3836;  /* ink / dark text */
  --MU: #8A8480;  /* muted text */
  --LN: #E8DCC8;  /* border / line */
  --S0: #D4856A;  /* score 0 — not implemented */
  --S1: #C4A96A;  /* score 1 — partial */
  --S2: #7A9BB5;  /* score 2 — mostly */
  --S3: #7AAF8F;  /* score 3 — full */
  --SD: 0 4px 24px rgba(58,56,54,.10);
  --SDL: 0 16px 56px rgba(58,56,54,.16);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'Sora',sans-serif;background:var(--BG);color:var(--IN);min-height:100vh;line-height:1.5}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer;border:none;background:none}
textarea{resize:none}

/* ─── Animations ─── */
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes in{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(168,153,194,.3)}50%{box-shadow:0 0 40px rgba(168,153,194,.6)}}
.u0{animation:up .4s ease both}
.u1{animation:up .4s .08s ease both}
.u2{animation:up .4s .16s ease both}
.u3{animation:up .4s .24s ease both}
.fi{animation:in .3s ease both}

/* ─── Layout ─── */
.shell{display:flex;min-height:100vh}

/* ─── SIDEBAR ─── */
.sidebar{
  width:68px;min-height:100vh;background:var(--IN);
  display:flex;flex-direction:column;align-items:center;
  padding:16px 0;position:fixed;top:0;left:0;z-index:200;
  box-shadow:2px 0 20px rgba(0,0,0,.15);
}
.logo-mark{
  width:42px;height:42px;border-radius:12px;background:var(--P);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;color:#fff;font-size:16px;font-weight:700;
  cursor:pointer;border:none;margin-bottom:24px;
  transition:transform .2s,box-shadow .2s;
  box-shadow:0 4px 14px rgba(0,0,0,.25);
}
.logo-mark:hover{transform:scale(1.08);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.nav-btn{
  width:42px;height:42px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.28);font-size:17px;
  border:none;background:transparent;cursor:pointer;
  transition:all .18s;margin-bottom:4px;position:relative;
}
.nav-btn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7)}
.nav-btn.on{background:var(--P);color:#fff;box-shadow:0 3px 12px rgba(0,0,0,.2)}
.nav-tip{
  position:absolute;left:54px;top:50%;transform:translateY(-50%);
  background:var(--IN);color:#fff;font-size:11px;font-weight:600;
  padding:4px 10px;border-radius:7px;white-space:nowrap;
  pointer-events:none;opacity:0;transition:opacity .15s;
  box-shadow:0 2px 10px rgba(0,0,0,.25);
}
.nav-btn:hover .nav-tip{opacity:1}
.sb-foot{
  margin-top:auto;font-size:8.5px;writing-mode:vertical-rl;
  letter-spacing:.2em;color:rgba(255,255,255,.12);font-weight:700;margin-bottom:12px;
}

/* ─── MAIN ─── */
.main{margin-left:68px;flex:1;display:flex;flex-direction:column;min-height:100vh}

/* ─── TOPBAR ─── */
.topbar{
  height:58px;background:var(--SF);border-bottom:1.5px solid var(--LN);
  padding:0 26px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.tb-left{display:flex;align-items:center;gap:11px}
.app-name{font-family:'Playfair Display',serif;font-size:19px;color:var(--IN);letter-spacing:-.3px}
.ch-pill{
  background:var(--P);color:#fff;font-size:10px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;padding:4px 11px;border-radius:20px;
}
.tb-right{display:flex;align-items:center;gap:13px}
.prog-row{display:flex;align-items:center;gap:8px}
.prog-txt{font-size:11.5px;color:var(--MU);font-weight:500}
.prog-rail{width:108px;height:5px;background:var(--LN);border-radius:10px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--P2),var(--P));border-radius:10px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.avatar-wrap{position:relative}
.avatar{
  width:33px;height:33px;border-radius:50%;background:var(--P);
  color:#fff;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:none;cursor:pointer;transition:all .18s;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.avatar:hover{transform:scale(1.08)}

/* ─── CHAPTER NAV ─── */
.ch-nav{
  background:var(--SF);border-bottom:1px solid var(--LN);
  padding:0 26px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;
}
.ch-nav::-webkit-scrollbar{display:none}
.ch-tab{
  padding:10px 12px;font-size:11px;font-weight:700;letter-spacing:.04em;
  color:var(--MU);border:none;background:transparent;cursor:pointer;
  border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .16s;
}
.ch-tab:hover{color:var(--IN)}
.ch-tab.on{color:var(--P);border-bottom-color:var(--P)}
.ch-tab.done{color:var(--S3)}

/* ─── SURVEY CONTENT ─── */
.content{flex:1;padding:26px 30px;max-width:840px;width:100%;margin:0 auto}

.breadcrumb{font-size:11.5px;color:var(--MU);margin-bottom:18px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bc-sep{opacity:.3}
.bc-hi{color:var(--P);font-weight:700}
.sec-tag{
  font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--P2);background:color-mix(in srgb,var(--P2) 12%,transparent);
  padding:3px 10px;border-radius:20px;
}

/* ─── QUESTION CARD ─── */
.qcard{
  background:var(--SF);border-radius:20px;box-shadow:var(--SD);
  padding:30px 34px;margin-bottom:16px;
  border:1px solid color-mix(in srgb,var(--LN) 80%,transparent);
  animation:up .35s ease both;
}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.q-num{
  background:var(--P2);color:#fff;font-size:10px;font-weight:700;
  padding:3px 10px;border-radius:20px;letter-spacing:.04em;
}
.q-ref{font-size:10px;color:var(--P);font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.risk-tag{
  font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;
  text-transform:uppercase;letter-spacing:.06em;
}
.rH{background:#FDE8E2;color:#C0502B}
.rM{background:#FDF3DF;color:#9A6B1A}
.rL{background:#E8F3EC;color:#2D7A4F}
.rI{background:var(--IN);color:#fff}
.app-tag{
  font-size:9.5px;color:var(--MU);background:var(--BG);
  padding:3px 9px;border-radius:20px;border:1px solid var(--LN);
}
.q-text{
  font-family:'Playfair Display',serif;font-size:19px;
  line-height:1.55;color:var(--IN);margin-bottom:12px;
}
.ev-box{
  font-size:12px;color:var(--MU);background:var(--BG);
  border-left:3px solid var(--P2);border-radius:0 8px 8px 0;
  padding:9px 13px;margin-bottom:24px;line-height:1.6;
}

/* ─── SCORE OPTIONS ─── */
.opts{display:flex;flex-direction:column;gap:8px}
.opt{
  display:flex;align-items:flex-start;gap:12px;
  padding:13px 15px;border-radius:13px;
  border:2px solid var(--LN);cursor:pointer;
  background:var(--BG);position:relative;overflow:hidden;
  transition:border-color .15s,background .15s,transform .12s;
}
.opt::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  border-radius:4px 0 0 4px;background:transparent;transition:background .15s;
}
.opt:hover{transform:translateX(2px);border-color:var(--P2)}
.opt.v0{border-color:var(--S0)!important;background:color-mix(in srgb,var(--S0) 7%,transparent)!important}
.opt.v0::before{background:var(--S0)!important}
.opt.v1{border-color:var(--S1)!important;background:color-mix(in srgb,var(--S1) 7%,transparent)!important}
.opt.v1::before{background:var(--S1)!important}
.opt.v2{border-color:var(--S2)!important;background:color-mix(in srgb,var(--S2) 8%,transparent)!important}
.opt.v2::before{background:var(--S2)!important}
.opt.v3{border-color:var(--S3)!important;background:color-mix(in srgb,var(--S3) 8%,transparent)!important}
.opt.v3::before{background:var(--S3)!important}

.opt-num{
  min-width:36px;height:36px;border-radius:9px;background:var(--LN);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:18px;color:var(--MU);
  flex-shrink:0;transition:all .15s;
}
.opt.v0 .opt-num{background:var(--S0);color:#fff}
.opt.v1 .opt-num{background:var(--S1);color:#fff}
.opt.v2 .opt-num{background:var(--S2);color:#fff}
.opt.v3 .opt-num{background:var(--S3);color:#fff}
.opt-body{flex:1}
.opt-lbl{font-size:12.5px;font-weight:600;color:var(--IN);margin-bottom:2px}
.opt-sub{font-size:11.5px;color:var(--MU);line-height:1.45}

/* ─── CORRECTIVE ACTION ─── */
.ca-panel{
  background:#FFF8F5;border:1.5px solid #F0CCBA;
  border-radius:11px;padding:12px 15px;margin-top:13px;
}
.ca-hd{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--S0);margin-bottom:5px}
.ca-bd{font-size:12px;color:var(--IN);line-height:1.6}

/* ─── NOTES ─── */
.notes-card{
  background:var(--SF);border-radius:14px;box-shadow:var(--SD);
  padding:18px 26px;margin-bottom:18px;
  border:1px solid color-mix(in srgb,var(--LN) 70%,transparent);
  animation:up .4s .1s ease both;
}
.notes-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--MU);margin-bottom:8px}
textarea{
  width:100%;border:2px solid var(--LN);border-radius:10px;
  padding:11px 13px;font-size:13px;color:var(--IN);
  background:var(--BG);outline:none;min-height:64px;
  transition:border-color .2s;
}
textarea:focus{border-color:var(--P)}
textarea::placeholder{color:color-mix(in srgb,var(--MU) 50%,transparent)}

/* ─── NAV ACTIONS ─── */
.actions{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;animation:up .4s .18s ease both}
.btn{padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;transition:all .18s}
.btn-ghost{
  background:transparent;color:var(--MU);
  border:2px solid var(--LN);
}
.btn-ghost:hover:not(:disabled){border-color:var(--MU);color:var(--IN)}
.btn-ghost:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{background:var(--P);color:#fff;border:none}
.btn-primary:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,0,0,.15)}
.btn-primary:disabled{background:var(--LN);color:var(--MU);cursor:not-allowed}
.dots{display:flex;gap:4px;align-items:center}
.dot{
  width:6px;height:6px;border-radius:50%;background:var(--LN);
  transition:all .18s;cursor:pointer;
}
.dot.on{background:var(--P);width:16px;border-radius:4px}
.dot.dn{background:var(--P2)}

/* ─── WELCOME ─── */
.welcome{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:60px 30px;text-align:center;
}
.welcome-title{font-family:'Playfair Display',serif;font-size:30px;color:var(--IN);margin-bottom:10px}
.welcome-sub{font-size:14px;color:var(--MU);line-height:1.8;max-width:400px}
.welcome-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:28px;max-width:460px;width:100%}
.ws{background:var(--SF);border-radius:13px;padding:14px 10px;border:1.5px solid var(--LN);text-align:center}
.ws-n{font-family:'Playfair Display',serif;font-size:26px;color:var(--P)}
.ws-l{font-size:10.5px;color:var(--MU);margin-top:2px}

/* ─── DASHBOARD ─── */
.dash{padding:26px 30px;max-width:960px;margin:0 auto}
.pg-title{font-family:'Playfair Display',serif;font-size:28px;margin-bottom:7px}
.pg-sub{font-size:13px;color:var(--MU);margin-bottom:24px}
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:24px}
.sum-card{background:var(--SF);border-radius:14px;padding:17px;border:1.5px solid var(--LN);text-align:center}
.sum-n{font-family:'Playfair Display',serif;font-size:32px;color:var(--IN)}
.sum-l{font-size:11px;color:var(--MU);margin-top:3px}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:13px}
.ch-card{
  background:var(--SF);border-radius:15px;padding:19px 21px;
  border:1.5px solid var(--LN);cursor:pointer;transition:all .18s;
  box-shadow:0 2px 10px rgba(58,56,54,.06);
}
.ch-card:hover{border-color:var(--P);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.cc-code{font-size:10px;font-weight:700;letter-spacing:.09em;color:var(--P);text-transform:uppercase;margin-bottom:5px}
.cc-name{font-family:'Playfair Display',serif;font-size:15px;color:var(--IN);margin-bottom:11px;line-height:1.3}
.cc-row{display:flex;align-items:center;gap:7px}
.cc-cnt{font-size:11px;color:var(--MU)}
.cc-rail{flex:1;height:4px;background:var(--LN);border-radius:10px;overflow:hidden}
.cc-fill{height:100%;border-radius:10px;transition:width .5s}
.cc-pct{font-size:11.5px;font-weight:600;color:var(--IN);min-width:26px;text-align:right}

/* ─── REPORT ─── */
.rpt-item{background:var(--SF);border-radius:12px;padding:16px 18px;margin-bottom:9px;border:1.5px solid var(--LN)}
.rpt-meta{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}

/* ─── DROPDOWN ─── */
.dropdown{
  position:absolute;top:calc(100% + 8px);right:0;
  background:var(--SF);border-radius:14px;box-shadow:var(--SDL);
  border:1.5px solid var(--LN);overflow:hidden;min-width:200px;z-index:400;
  animation:up .2s ease both;
}
.dd-head{padding:12px 15px 9px;border-bottom:1px solid var(--LN)}
.dd-org{font-size:13px;font-weight:700;color:var(--IN)}
.dd-email{font-size:11px;color:var(--MU);margin-top:1px}
.dd-item{
  padding:11px 15px;font-size:13px;cursor:pointer;
  display:flex;align-items:center;gap:9px;
  transition:background .13s;width:100%;text-align:left;color:var(--IN);
}
.dd-item:hover{background:var(--BG)}
.dd-item.red{color:var(--S0)}

/* ─── MODAL OVERLAY ─── */
.overlay{
  position:fixed;inset:0;background:rgba(58,56,54,.5);
  display:flex;align-items:center;justify-content:center;
  z-index:600;padding:20px;animation:in .2s ease;
  backdrop-filter:blur(2px);
}
.modal{
  background:var(--SF);border-radius:22px;padding:30px 34px;
  width:100%;max-width:460px;box-shadow:var(--SDL);
  animation:up .3s ease both;
}
.modal-title{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:20px}
.modal-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:20px}

/* ─── AUTH PAGE ─── */
.auth-pg{
  min-height:100vh;background:var(--BG);
  display:flex;position:relative;overflow:hidden;
}
/* Left panel — decorative */
.auth-left{
  width:42%;background:var(--IN);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:60px 48px;position:relative;overflow:hidden;
}
.auth-left-orb1{
  position:absolute;top:-100px;right:-100px;
  width:360px;height:360px;border-radius:50%;
  background:radial-gradient(circle,color-mix(in srgb,var(--P) 30%,transparent) 0%,transparent 70%);
}
.auth-left-orb2{
  position:absolute;bottom:-80px;left:-80px;
  width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,color-mix(in srgb,var(--P2) 25%,transparent) 0%,transparent 70%);
}
.auth-logo-big{
  width:72px;height:72px;border-radius:20px;background:var(--P);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;color:#fff;font-size:28px;font-weight:700;
  margin-bottom:24px;position:relative;z-index:1;
  animation:float 4s ease-in-out infinite;
  box-shadow:0 12px 32px rgba(0,0,0,.3);
}
.auth-brand{
  font-family:'Playfair Display',serif;font-size:38px;color:#fff;
  position:relative;z-index:1;margin-bottom:10px;
}
.auth-tagline{
  font-size:12px;color:rgba(255,255,255,.45);letter-spacing:.12em;
  text-transform:uppercase;font-weight:600;position:relative;z-index:1;margin-bottom:40px;
}
.auth-feature{
  position:relative;z-index:1;width:100%;
  background:rgba(255,255,255,.06);border-radius:14px;
  padding:16px 18px;margin-bottom:10px;border:1px solid rgba(255,255,255,.09);
}
.af-icon{font-size:18px;margin-bottom:7px}
.af-title{font-size:13px;font-weight:700;color:rgba(255,255,255,.85);margin-bottom:3px}
.af-desc{font-size:11.5px;color:rgba(255,255,255,.4);line-height:1.5}
/* Right panel — form */
.auth-right{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:48px 40px;
}
.auth-form-wrap{width:100%;max-width:400px}
.auth-form-title{font-family:'Playfair Display',serif;font-size:26px;color:var(--IN);margin-bottom:5px}
.auth-form-sub{font-size:13px;color:var(--MU);margin-bottom:26px}
/* Mode toggle */
.mode-bar{display:flex;background:var(--BG);border-radius:11px;padding:4px;margin-bottom:24px;border:1.5px solid var(--LN)}
.mode-btn{
  flex:1;padding:9px 0;border-radius:8px;
  font-size:13px;font-weight:600;transition:all .18s;
}
.mode-btn.on{background:var(--SF);color:var(--IN);box-shadow:0 1px 5px rgba(58,56,54,.1)}
.mode-btn:not(.on){color:var(--MU)}

/* Form fields */
.fld{margin-bottom:15px}
.fld-lbl{display:block;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--MU);margin-bottom:5px}
.fld-row{position:relative}
.fld-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.4;pointer-events:none;z-index:1}
.fld-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.4;cursor:pointer;background:none;border:none;padding:4px;z-index:1}
.fld-eye:hover{opacity:.8}
.fld-in{
  width:100%;padding:11px 13px 11px 36px;
  border:2px solid var(--LN);border-radius:10px;
  font-size:13.5px;color:var(--IN);background:var(--BG);
  outline:none;transition:border-color .18s,box-shadow .18s;
}
.fld-in:focus{border-color:var(--P);box-shadow:0 0 0 3px color-mix(in srgb,var(--P) 15%,transparent)}
.fld-in.has-eye{padding-right:38px}
.fld-in::placeholder{color:color-mix(in srgb,var(--MU) 45%,transparent)}

/* Palette picker */
.pal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:5px}
.pal-card{
  padding:11px 12px;border-radius:11px;border:2px solid var(--LN);
  background:var(--BG);cursor:pointer;transition:all .15s;
}
.pal-card.sel{background:color-mix(in srgb,var(--P) 8%,transparent)}
.pal-swatches{display:flex;gap:5px;margin-bottom:6px}
.swatch{width:14px;height:14px;border-radius:50%}
.pal-name{font-size:12px;font-weight:700;color:var(--IN)}
.pal-desc{font-size:10.5px;color:var(--MU)}

/* Error */
.err-box{
  background:#FDE8E2;border:1px solid #F0C0B0;border-radius:9px;
  padding:9px 13px;font-size:12.5px;color:#B84020;margin-bottom:13px;
  display:flex;align-items:flex-start;gap:8px;
}
/* Submit */
.sub-btn{
  width:100%;padding:13px 0;border-radius:11px;
  font-size:14px;font-weight:700;letter-spacing:.01em;
  background:var(--P);color:#fff;border:none;cursor:pointer;
  transition:all .2s;margin-top:4px;
}
.sub-btn:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.18)}
.sub-btn:disabled{background:var(--LN);color:var(--MU);cursor:not-allowed;transform:none;box-shadow:none}
.sub-btn.loading::after{
  content:'';display:inline-block;width:14px;height:14px;
  border:2px solid rgba(255,255,255,.4);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;margin-left:8px;vertical-align:middle;
}
.switch-link{color:var(--P);cursor:pointer;font-weight:600}
.switch-link:hover{text-decoration:underline}

/* Auth footer note */
.auth-note{
  text-align:center;font-size:11px;color:var(--MU);margin-top:16px;line-height:1.7;
}
.iso-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--BG);border:1.5px solid var(--LN);
  border-radius:20px;padding:4px 11px;font-size:10.5px;
  color:var(--MU);font-weight:600;
}

/* Responsive */
@media(max-width:768px){
  .auth-left{display:none}
  .auth-right{padding:32px 24px}
  .sum-grid{grid-template-columns:1fr 1fr}
  .content,.dash{padding:16px}
  .topbar{padding:0 14px}
  .ch-nav{padding:0 14px}
  .qcard{padding:22px 18px}
}

nent risk of an individual physically harming staff, self, or others - Notification of the individual served and their family, in accordance with law and regulation, of the organization\u2019s policy on the use of restraint and seclusion - Notification of the family of the individual served when restraint or seclusion is initiated (for a child or youth, the parent[s] or guardian), in accordance with law and regulation - Notification of the administrative and/or clinical leaders when an order for restraint or seclusion is extended beyond the initial order or when an individual served experiences multiple episodes of restraint or seclusion - The determination of who has authority to order, initiate, and discontinue the use of restraint and seclusion, in accordance with law and regulation - The requirement that restraint or seclusion is discontinued as soon as is safely possible - The determination of who can assess and monitor individuals served in restraint or seclusion - Time frames for assessing and monitoring individuals in restraint or seclusion - Time-limited orders in accordance with law and regulation - Post-restraint or seclusion practices (such as debrief, assessment of mental and physical state) - A plan for providing emergency medical services. - Reporting injuries and deaths to the organization's leadership and external agencies in accordance with law and regulation - Documentation of restraint or seclusion - Data collection on the use of restraint or seclusion and how it is used in performance improvement activities - Debriefing after an episode of restraint or seclusion?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Policy/procedure; Completed screening/assessment in EMR; Training roster + competency/education record; Documentation in chart; Restraint/seclusion log + debrief notes","role":"Nursing","where_verified":"","common_findings":"Training not documented or not role-specific; Documentation missing/unclear in EMR","risk_level":"ITL","corrective_action":""},{"standard":"CTS.05.05.03","ep":"EP 1","question":"How does the organization bases its staffing on a variety of factors, including the following: - Staff competencies - The physical design of the environment - Acuity levels of individuals served - Age and emotional, behavioral, and developmental functioning of individuals served?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Restraint/seclusion log + debrief notes","role":"Nursing","where_verified":"","common_findings":"Policy exists but practice not consistently evidenced","risk_level":"ITL","corrective_action":""},{"standard":"CTS.05.05.05","ep":"EP 1","question":"How does the organization trains staff on the use of restraint and seclusion and assesses their competence at orientation and on a periodic basis thereafter?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Restraint/seclusion log + debrief notes","role":"Nursing / Clinical Leadership","where_verified":"","common_findings":"Policy exists but practice not consistently evidenced","risk_level":"ITL","corrective_action":""},{"standard":"CTS.05.05.05","ep":"EP 2","question":"Any staff involved in the use of restraint or seclusion receive education and training and demonstrate knowledge focused on the following: - Strategies to identify behaviors of staff and individuals served, events, and environmental factors that may trigger circumstances that require the use of restraint or seclusion - Recognizing how age, developmental considerations, gender issues, ethnicity, and history of sexual or physical abuse may affect the way in which an individual served reacts to physical contact r seclusion?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Completed screening/assessment in EMR; Restraint/seclusion log + debrief notes","role":"Nursing","where_verified":"","common_findings":"Policy exists but practice not consistently evidenced","risk_level":"ITL","corrective_action":""},{"standard":"CTS.05.05.09","ep":"EP 2","question":"An assigned staff member who is competent and trained monitors the individual in restraint or seclusion through continuous in-person observation. Note: An individual in seclusion without restraints may be continuously monitored using simultaneous video and audio equipment, if consistent with the individual\u2019s condition or wishes?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Restraint/seclusion log + debrief notes","role":"Nursing / Clinical Leadership","where_verified":"","common_findings":"Policy exists but practice not consistently evidenced","risk_level":"ITL","corrective_action":""},{"standard":"CTS.05.05.11","ep":"EP 1","question":"A physician or licensed practitioner, who is authorized to order restraint or seclusion by organization policy in accordance with state law, orders the use or continuation of restraint and seclusion. Note: Because the use of restraint and seclusion is limited to emergencies (in which a physician or other licensed practitioner may not be immediately available), the organization may authorize qualified, trained staff members to initiate restraint or seclusion before an order is obtained from a physician or other licensed practitioner?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Policy/procedure; Restraint/seclusion log + debrief notes","role":"Nursing","where_verified":"","common_findings":"Policy exists but practice not consistently evidenced","risk_level":"ITL","corrective_action":""},{"standard":"CTS.05.05.11","ep":"EP 2","question":"As soon as possible after the initiation of restraint or seclusion, in accordance with organization policy, qualified staff notify and obtain an order (verbal or written) from a physician or other licensed practitioner authorized to order restraint or seclusion by organization policy in accordance with state law, if the practitioner did not order the restraint or seclusion?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Policy/procedure; Restraint/seclusion log + debrief notes","role":"Nursing / Clinical Leadership","where_verified":"","common_findings":"Policy exists but practice not consistently evidenced","risk_level":"ITL","corrective_action":""},{"standard":"CTS.05.05.11","ep":"EP 3","question":"Written and verbal orders for restraint and seclusion are limited to the following: - Four hours for adults ages 18 and older - Two hours for children and youth ages 9 to 17 - One hour for children under age 9 Note: If restraint or seclusion use needs to continue beyond the expiration of the time-limited order, a new order for restraint or seclusion is obtained from the physician or other licensed practitioner?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Restraint/seclusion log + debrief notes","role":"Nursing / Clinical Leadership","where_verified":"","common_findings":"Policy exists but practice not consistently evidenced","risk_level":"ITL","corrective_action":""},{"standard":"CTS.05.05.11","ep":"EP 4","question":"Orders for restraint or seclusion are not written as a standing order or for use on ganization policy?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Policy/procedure; Restraint/seclusion log + debrief notes","role":"Nursing / Clinical Leadership","where_verified":"","common_findings":"Policy exists but practice not consistently evidenced","risk_level":"ITL","corrective_action":""},{"standard":"CTS.05.05.13","ep":"EP 3","question":"Unless state law is more restrictive, every 24 hours, a physician or other authorized licensed practitioner responsible for the individual served sees and evaluates the individual before writing a new order for restraint or seclusion in accordance with organization policy and law and regulation?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Policy/procedure; Restraint/seclusion log + debrief notes","role":"Nursing / Clinical Leadership","where_verified":"","common_findings":"Policy exists but practice not consistently evidenced","risk_level":"ITL","corrective_action":""},{"standard":"CTS.05.05.13","ep":"EP 4","question":"At the time of the in-person evaluation of the individual in restraint or seclusion or when consulting with the designee who performed the evaluation, the physician or licensed practitioner does the following: - Works with the individual served and staff to identify ways to help the individual regain control - Revises the individual\u2019s plan for care, treatment, or services as needed - If necessary, provides a new written or verbal order for restraint or seclusion?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Treatment plan showing requirement; Restraint/seclusion log + debrief notes","role":"Nursing / Clinical Leadership","where_verified":"","common_findings":"Intervention not reflected in the treatment plan","risk_level":"ITL","corrective_action":""},{"standard":"CTS.05.05.15","ep":"EP 1","question":"As early as feasible in the restraint or seclusion process, the individual served is made aware of the rationale for restraint or seclusion and the behavior criteria for its discontinuation. Restraint or seclusion is then discontinued as soon as the individual served meets the behavior criteria?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Restraint/seclusion log + debrief notes","role":"Nursing / Clinical Leadership","where_verified":"","common_findings":"Policy exists but practice not consistently evidenced","risk_level":"ITL","corrective_action":""},{"standard":"CTS.05.05.15","ep":"EP 2","question":"Staff help individuals in restraint or seclusion to meet the behavior criteria for discontinuing restraint or seclusion?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Restraint/seclusion log + debrief notes","role":"Nursing / Clinical Leadership","where_verified":"","common_findings":"Policy exists but practice not consistently evidenced","risk_level":"ITL","corrective_action":""},{"standard":"CTS.05.05.17","ep":"EP 1","question":"For each episode of restraint or seclusion, the individual served and, if appropriate, the individual\u2019s family participate in a debriefing with available staff members who were involved in the episode as soon as possible, but no longer than 24 hours after the episode?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Restraint/seclusion log + debrief notes","role":"Nursing","where_verified":"","common_findings":"Policy exists but practice not consistently evidenced","risk_level":"ITL","corrective_action":""},{"standard":"CTS.05.05.17","ep":"EP 2","question":"The debriefing about each episode of restraint or seclusion is used to do the following: - Identify what led to the incident and what could have been handled differently - Ascertain that the physical well-being, psychological comfort, and right to privacy of the individual served were addressed - Counsel the individual served for any trauma that may have resulted from the incident - Assess the impact of the restraint or seclusion episode on their behavioral functioning - When indicated, modify the individual\u2019s plan for care, treatment, or services?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Treatment plan showing requirement; Restraint/seclusion log + debrief notes","role":"Nursing","where_verified":"","common_findings":"Intervention not reflected in the treatment plan","risk_level":"ITL","corrective_action":""},{"standard":"CTS.05.05.19","ep":"EP 1","question":"Documentation of restraint and seclusion in the case/clinical record includes the following: - Any in-person medical and behavioral evaluation for restraint or seclusion - A description of the individual\u2019s behavior and the intervention used - Any alternatives or other less restrictive interventions attempted - The individual\u2019s condition or symptom(s) that warranted the use of the restraint or seclusion, including concerns about the safety of the individual or staff, and the rationale for the type of intervention used - The individual\u2019s response to the intervention(s) used, including the rationale for continued use of the intervention - Each of the individual\u2019s assessments and reassessments performed by staff - Continuous monitoring of the individual served - Revisions to the plan for care, treatment, or services - Death or injury associated with the use of restraint or seclusion - Names of the staff members who participated in the restraint and seclusion episode, including those who were directly involved and those who monitored the well-being of the individual served - Notification of the use of restraint or seclusion to the physician or other licensed practitioner - Orders for restraint or seclusion - That the family of the individual served was notified of the use of restraint and/or seclusion (for a child or youth, this includes their parent[s] or guardian) - Behavior criteria for discontinuing restraint and/or seclusion - That the individual served was informed of the behavior criteria they needed to meet for restraint and/or seclusion to be discontinued - Assistance provided to the individual served to help them meet the behavior criteria for discontinuing the use of restraint and/or seclusion - Debriefing the individual served with staff following an episode of restraint and/or seclusion?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Completed screening/assessment in EMR; Treatment plan showing requirement; Documentation in chart; Restraint/seclusion log + debrief notes","role":"Nursing / Clinical Leadership","where_verified":"","common_findings":"Intervention not reflected in the treatment plan; Documentation missing/unclear in EMR","risk_level":"ITL","corrective_action":""},{"standard":"CTS.05.05.21","ep":"EP 1","question":"The organization\u2019s leaders determine the frequency with which data on the use of restraint and seclusion are analyzed. When an opportunity for improvement is identified, the organization implements a performance improvement plan to address the opportunity. Note: When determining the frequency of analysis, the organization takes into consideration the number of cases where restraint or seclusion are used. At a minimum, the data is analyzed annually. (See also PI.01.01.01, EP 20; PI.04.01.01, EP 2)?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Restraint/seclusion log + debrief notes","role":"Nursing / Clinical Leadership","where_verified":"","common_findings":"Policy exists but practice not consistently evidenced","risk_level":"ITL","corrective_action":""},{"standard":"CTS.05.05.21","ep":"EP 2","question":"Data on all restraint and seclusion episodes are collected from and classified for all settings/locations by the following: - Shift - Staff who initiated the process - The length of each episode - Day of the week each episode was initiated - The type of restraint used - Number of episodes per individual served - Whether injuries were sustained by the individual served or staff - Age of the individual served - Gender of the individual served - Race, ethnicity, and preferred language of the individual served?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Restraint/seclusion log + debrief notes","role":"Nursing / Clinical Leadership","where_verified":"","common_findings":"Policy exists but practice not consistently evidenced","risk_level":"ITL","corrective_action":""},{"standard":"CTS.06.01.03","ep":"EP 1","question":"Needs, preferences, and goals of the individual served guide the following: - The type of education, training, and support provided - The intensity of education, training, and support provided - The duration of education, training, and support provided?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Training roster + competency/education record","role":"Case Management","where_verified":"","common_findings":"Training not documented or not role-specific","risk_level":"Moderate","corrective_action":""},{"standard":"CTS.06.01.03","ep":"EP 2","question":"Needs, preferences, and goals of the individual served, and the organization\u2019s scope of services, guide the provision to the individual of educational opportunities about the following: - Personal grooming and hygiene - Housekeeping - Shopping for necessities - Meal preparation and healthy eating - Budgeting - Banking - Accessing public transportation - Use of community resources - Communication skills - Social skills - Leisure and recreational activities for children, youth, and adults - Volunteer activity - Illness self-management (for example, symptom management, medication management), including what to do in case of a crisis or health problem?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Chart review + policy evidence","role":"Nursing","where_verified":"","common_findings":"Policy exists but practice not consistently evidenced","risk_level":"Moderate","corrective_action":""},{"standard":"CTS.06.02.01","ep":"EP 1","question":"How does the organization has a process for addressing the continuity of care, treatment, or services after transfer, discharge, or termination of care, treatment, or services that includes the following: - The transfer of responsibility for care, treatment, or services for the individual served - The reason(s) for transfer, discharge, or termination of care, treatment, or services - Mechanisms for internal and external transfer - Identification of the person who has accountability and responsibility for the safety and well-being of the individual served during a transfer Note: Transfer can be from one staff to another within the organization, to another program or service within the organization, or to an external organizati olicy exists but practice not consistently evidenced","risk_level":"Moderate","corrective_action":""},{"standard":"CTS.06.02.03","ep":"EP 3","question":"Planning for transfer, discharge, or termination of care, treatment, or services involves the individual served, their family, if applicable, and staff. Note: Family includes legal guardian and surrogate decision-maker (refer to the Glossary)?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Chart review + policy evidence","role":"Case Management","where_verified":"","common_findings":"Policy exists but practice not consistently evidenced","risk_level":"Moderate","corrective_action":""},{"standard":"CTS.06.02.03","ep":"EP 4","question":"When the individual served is transferred, information provided to the individual includes the following: - The reason they are being transferred - Alternatives to transfer, if any?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Chart review + policy evidence","role":"Clinical","where_verified":"","common_findings":"Policy exists but practice not consistently evidenced","risk_level":"Moderate","corrective_action":""},{"standard":"CTS.06.02.03","ep":"EP 5","question":"How does the organization discusses plans for transfer, discharge, or termination of care, treatment, or services, or changes in these plans, with the individual served and, with the individual's consent, their family. If the individual is a child or youth, the organization acts in accordance with law and regulation?","criteria":"0=No program/no evidence; 1=Program exists but not implemented or high-risk gaps; 2=Implemented with minor gaps; 3=Fully implemented and sustained","evidence":"Chart review + policy evidence","role":"Case Management","where_verified":"","common_findi :"EP 1","question":"Show me your written all-hazards Emergency Operations Plan (EOP) and supporting procedures. How does it cover activation, communications, operations changes/closure, shelter-in-place, evacuation/relocation, and safety/security?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"EOP; activation criteria; communications procedures; shelter/evacuation procedures; closure/relocation procedures; safety/security procedures","role":"EM Coordinator / Leadership","where_verified":"Policy; Staff Interview","common_findings":"EOP exists but lacks required components; procedures not actionable; staff unfamiliar","risk_level":"High","corrective_action":"Revise EOP to include all required components; develop checklists; train staff; conduct drills"},{"standard":"EM.12.01.01","ep":"EP 2","question":"How does the EOP identify who you will serve and what care/treatment/services you can provide during an emergency based on staff, space, and supplies?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"EOP service continuation matrix; triage/priority list; scope-of-service decision criteria","role":"Clinical Director / Leadership / EM Coordinator","where_verified":"Policy; Staff Interview","common_findings":"No defined service scope during emergencies; assumptions not documented","risk_level":"High","corrective_action":"Define essential services and decision thresholds; document continuity/closure triggers; communicate to staff"},{"standard":"EM.12.01.01","ep":"EP 3","question":"What are your written procedures for when and how you will shelter in place or evacuate (partial/complete) staff and individuals served, including transportation and special needs?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Shelter-in-place plan; evacuation plan; maps/routes; transportation agreements; special-needs considerations","role":"EM Coordinator / Operations / Clinical Leadership","where_verified":"Policy; Environment; Staff Interview","common_findings":"Evacuation plans generic; no transport plan; special needs not addressed","risk_level":"High","corrective_action":"Update shelter/evac procedures; validate transport resources; conduct evacuation/shelter tabletop and corrective actions"},{"standard":"EM.12.01.01","ep":"EP 5","question":"What is your process for activating the EOP, and who is responsible for operational decisions during an emergency or disaster incident?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Activation triggers; call-down list; incident command/decision authority; delegation plans","role":"Leadership / EM Coordinator","where_verified":"Policy; Staff Interview","common_findings":"Activation authority unclear; no documented triggers; staff unsure who makes decisions","risk_level":"High","corrective_action":"Define activation triggers and decision authority; train leaders; test call-down and activation process"},{"standard":"EM.12.01.01","ep":"EP 6","question":"How do you cooperate and collaborate with community partners and authorities (fire/police/public health/incident command/emergency management) before and during emergencies?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"MOUs; partner contact lists; meeting participation; communications with authorities; joint exercise participation (if applicable)","role":"EM Coordinator / Leadership","where_verified":"Records; Staff Interview","common_findings":"No documented community coordination; contact lists outdated","risk_level":"Moderate","corrective_action":"Build and maintain partner/authority coordination process; update contact list; document outreach and participation"},{"standard":"EM.12.02.01","ep":"EP 2","question":"How will you communicate during an emergency with staff, individuals served/surrogates, and community partners, including rapid notification and service cancellation/rescheduling?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Communications plan; phone tree; mass notification procedures; scripts/templates; partner notification list","role":"EM Coordinator / Leadership / Clinical Director","where_verified":"Policy; Staff Interview","common_findings":"Phone tree not tested; no plan for notifying patients/partners; inconsistent messaging","risk_level":"High","corrective_action":"Develop/test notification methods; document procedures and scripts; run communications drill and correct gaps"},{"standard":"EM.12.02.01","ep":"EP 6","question":"What are your primary and alternate communication methods with staff and authorities, and when/how do you switch to backup methods?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Primary/alternate comms inventory; escalation procedures; downtime communications plan; testing logs","role":"EM Coordinator / IT / Leadership","where_verified":"Policy; Logs; Staff Interview","common_findings":"Backup communications not defined or not tested; staff unaware of alternatives","risk_level":"High","corrective_action":"Define backup methods and triggers; test quarterly; train staff; document results and improvements"},{"standard":"EM.12.02.03","ep":"EP 1","question":"Show me your staffing plan for emergencies\u2014how do you contact off-duty staff, obtain staff from other facilities, and use agencies/disaster mental health providers when applicable?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Staffing plan; call-down procedures; staffing agency agreements; mutual aid/system staffing agreements","role":"HR / Leadership / EM Coordinator","where_verified":"Policy; Records","common_findings":"No plan for shortages; agreements expired; call-down list outdated","risk_level":"High","corrective_action":"Update staffing plan and agreements; maintain current call-down list; test staffing plan in exercises"},{"standard":"EM.12.02.03","ep":"EP 2","question":"How do you manage staff reporting, define essential roles/responsibilities, and integrate agency/deployed staff into assigned duties during an emergency?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Role cards; essential functions list; reporting instructions; onboarding for deployed staff","role":"HR / Operations / EM Coordinator","where_verified":"Policy; Staff Interview","common_findings":"Roles unclear; no integration process for temp staff; reporting processes not understood","risk_level":"Moderate","corrective_action":"Create role-based checklists; implement rapid onboarding/integration steps; train supervisors"},{"standard":"EM.12.02.05","ep":"EP 1","question":"How will you continue services or transfer individuals served\u2014what facilities are identified in advance, how is information shared lawfully, and how is transportation arranged?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsi al Leadership","where_verified":"Logs; Staff Interview","common_findings":"No tracking method; relocation documentation incomplete; headcounts not defined","risk_level":"High","corrective_action":"Implement tracking procedure and forms; train staff; test in drill/tabletop; audit compliance"},{"standard":"EM.12.02.09","ep":"EP 1","question":"What items are considered emergency resources/assets, and how do you document, track, monitor, and locate them during and after an emergency to remain operational?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Emergency resource inventory; tracking logs; cache locations; inspection schedule","role":"Facilities / Supply Chain / EM Coordinator","where_verified":"Logs; Environment","common_findings":"No defined emergency inventory; cache not monitored; supplies expired","risk_level":"High","corrective_action":"Define emergency inventory and tracking system; establish inspection schedule; correct expiration/stock issues"},{"standard":"EM.12.02.09","ep":"EP 2","question":"How will you obtain, allocate, mobilize, replenish, and conserve resources during and after an emergency\u2014including coordination with health systems, vendors, and government agencies?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Vendor alternatives; MOUs; procurement procedures; conservation strategies; request pathways","role":"Leadership / Supply Chain / EM Coordinator","where_verified":"Policy; Records","common_findings":"No alternate vendors; no conservation plan; unclear request pathways","risk_level":"Moderate","corrective_action":"Establish alternate sourcing and conservation plan; document request procedures; run exercise scenario to validate"},{"standard":"EM.12.02.11","ep":"EP 1","question":"Which utility systems are essential/critical for you to continue services during an emergency (power, HVAC, water, network/connectivity, refrigeration, etc.)?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Utilities risk assessment; list of critical utilities; service dependencies; equipment lists","role":"Facilities / IT / EM Coordinator","where_verified":"Policy; Records","common_findings":"Critical utilities not identified; dependencies not understood (e.g., Wi-Fi for EMR/phones)","risk_level":"High","corrective_action":"Document critical utilities and dependencies; align with HVA; integrate into EOP and drills"},{"standard":"EM.12.02.11","ep":"EP 2","question":"What alternative means do you have for providing essential utilities (backup power, alternative water, network contingency), and how are these maintained and tested?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Backup power plans; water contingency; IT downtime procedures; maintenance/testing records","role":"Facilities / IT / EM Coordinator","where_verified":"Logs; Policy; Environment","common_findings":"No documented alternatives; testing/maintenance not performed or not documented","risk_level":"High","corrective_action":"Implement and test utility contingencies; document maintenance/testing schedule; train staff on downtime workflows"},{"standard":"EM.14.01.01","ep":"EP 1","question":"Show me your written disaster recovery plan\u2014what strategies, actions, and responsibilities restore services after an incident?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sus icensure tracker with renewal alerts; conduct monthly audits; remove from duty if expired"},{"standard":"HRM.01.01.03","ep":"EP 2","question":"How do you ensure staff practice within the scope of their license/certification/registration and organizational policy?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Scope-of-practice policies; supervision protocols; competency assessments; training records","role":"HR / Clinical Leadership","where_verified":"Policy; Staff Interview","common_findings":"Staff assigned tasks beyond scope; unclear supervision expectations","risk_level":"High","corrective_action":"Clarify scope expectations; train supervisors; implement periodic scope audits and corrective action"},{"standard":"HRM.01.01.03","ep":"EP 3","question":"How do you ensure staff practice within the scope of their job description?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Job descriptions; assignment protocols; supervision notes; performance evals","role":"Department Leaders / HR","where_verified":"Staff Interview; HR Files","common_findings":"Job duties drift from JD; no documentation of added responsibilities/training","risk_level":"Moderate","corrective_action":"Align assignments to JD; update JD when duties change; verify competency before expanding duties"},{"standard":"HRM.01.02.01","ep":"EP 1","question":"Show me primary source verification of licensure/certification/registration at hire and renewal\u2014what is your process and where is it documented?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Primary source verification records (board lookups/letters/CVO attestation); renewal PSV logs","role":"HR / Credentialing","where_verified":"HR Files; Records","common_findings":"Copies kept without primary source verification; renewals not re-verified","risk_level":"High","corrective_action":"Standardize PSV steps; document source, date, and verifier; audit PSV at hire and renewal"},{"standard":"HRM.01.02.01","ep":"EP 2","question":"How do you verify and document education and experience required for the role (unless already verified by the issuing entity)?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Transcripts/diplomas; training completion letters; reference checks; CV/resume verification notes","role":"HR / Hiring Manager","where_verified":"HR Files","common_findings":"Education/experience not verified; reliance on resume only; missing documentation","risk_level":"High","corrective_action":"Add verification checklist; require documentation before start; audit new-hire files"},{"standard":"HRM.01.02.01","ep":"EP 3","question":"How do you verify the identity of the job applicant using a valid picture ID, and where is that retained?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Copy/verification of state or federal photo ID; onboarding checklist","role":"HR","where_verified":"HR Files","common_findings":"ID not verified or not documented; inconsistent retention","risk_level":"Moderate","corrective_action":"Add mandatory ID verification step to onboarding; document verifier/date; correct missing files"},{"standard":"HRM.01.02.01","ep":"EP 4","question":"How do you obtain and document criminal background checks as required by law/regulation or organizational policy?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Background check reports/attestations; screening policy; adjudication criteria","role":"HR / Compliance","where_verified":"HR Files; Policy","common_findings":"Background checks missing; results not adjudicated consistently; contractors not screened per policy","risk_level":"High","corrective_action":"Implement background check workflow with adjudication criteria; audit compliance; extend to contractors per policy"},{"standard":"HRM.01.02.01","ep":"EP 5","question":"How do you ensure staff comply with required health screening, and how is compliance documented?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Pre-employment health screening records; immunization/TB/fit testing (if applicable); illness reporting/work restrictions","role":"HR / Infection Control / Occupational Health","where_verified":"HR Files; Logs","common_findings":"Missing screenings; inconsistent documentation; no tracking for renewals","risk_level":"High","corrective_action":"Create health screening tracker; align with IPC policy; remediate missing items and track renewals"},{"standard":"HRM.01.02.01","ep":"EP 6","question":"How do you use verified credentials, education/experience, background checks, health screening, and license challenges to make hiring/assignment decisions?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Hiring decision documentation; risk review notes; license challenge evaluations; assignment approvals","role":"HR / Leadership / Hiring Manager","where_verified":"Records; HR Files","common_findings":"No evidence of decision-making process; adverse findings not evaluated/documented","risk_level":"High","corrective_action":"Implement hiring decision checklist and documentation; require leadership review for adverse findings; retain evidence"},{"standard":"HRM.01.02.01","ep":"EP 7","question":"For physicians and dentists, show me NPDB queries at hire and at least every 3 years\u2014how do you track and respond to findings?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"NPDB query results; tracking log; follow-up evaluation documentation","role":"Credentialing / Medical Director / HR","where_verified":"HR Files; Records","common_findings":"NPDB queries missing or overdue; findings not evaluated or actioned","risk_level":"High","corrective_action":"Create NPDB schedule tracker; run overdue queries; document review and actions; report to leadership"},{"standard":"HRM.01.03.01","ep":"EP 1","question":"How do you determine the key safety content required in staff orientation, based on services and environment of care?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Orientation curriculum; key safety topics list; risk assessment inputs; role-based modules","role":"HR / Safety Officer / Leadership","where_verified":"Policy; Training Records","common_findings":"Orientation content not defined; generic topics not tied to services/risks","risk_level":"High","corrective_action":"Define key safety content by role and site; approve curriculum; review annually or when services change"},{"standard":"HRM.01.03.01","ep":"EP 2","question":"How do you ensure staff complete key safety orientation before providing care/treatment/services, and how is completion documented?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Orientation checklists; sign-in/LMS completion; start-date controls; preceptor sign-off","role":"HR / Department Leaders","where_verified":"Training Records; HR Files","common_findings":"Staff start before orientation completed; missing documentation","risk_level":"High","corrective_action":"Implement 'no-service-until-complete' control; track completion; audit within first 7 days and remediate"},{"standard":"HRM.01.03.01","ep":"EP 3","question":"Show me orientation documentation covering job-duty policies, duties/responsibilities, cultural sensitivity, and individuals\u2019 rights/ethics\u2014how do you confirm staff understanding?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Orientation modules; cultural sensitivity content; rights/ethics training; quizzes/competency checks","role":"HR / Clinical Leadership","where_verified":"Training Records; Staff Interview","common_findings":"Orientation missing rights/ethics or cultural sensitivity; no check for understanding","risk_level":"Moderate","corrective_action":"Add required modules and knowledge checks; update onboarding packet; conduct spot-interviews and coaching"},{"standard":"HRM.01.03.01","ep":"EP 7","question":"If you sponsor or offer peer support services, how do you orient staff to working collaboratively with persons providing peer support?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Peer support collaboration training; orientation content; role clarity materials","role":"Peer Services Lead / HR / Clinical Leadership","where_verified":"Training Records; Staff Interview","common_findings":"Peer roles unclear; staff not trained on collaboration boundaries and escalation","risk_level":"Moderate","corrective_action":"Implement peer collaboration orientation module; clarify workflows; validate via staff interviews"},{"standard":"HRM.01.03.01","ep":"EP 8","question":"If you sponsor or offer peer support services, how are persons providing peer support oriented to their role, communication techniques, support methods, advocacy, disengagement, crisis recognition, and crisis response procedures?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Peer orientation checklist; training modules; supervision plan; crisis response procedures","role":"Peer Services Lead / HR / Clinical Leadership","where_verified":"Training Records; Staff Interview","common_findings":"Peer orientation incomplete; no crisis response training; disengagement not addressed","risk_level":"High","corrective_action":"Build peer orientation packet with required topics; document completion; supervise and reassess competency"},{"standard":"HRM.01.04.01","ep":"EP 1","question":"How do you determine the scope and depth of supervision based on staff duties, experience, and populations served?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Supervision policy; supervision plans by role; supervision frequency standards; org chart","role":"Clinical Director / Department Leaders","where_verified":"Policy; Staff Interview; Records","common_findings":"Supervision frequency not defined; new staff not supervised more closely; population risk not considered","risk_level":"High","corrective_action":"Define supervision expectations by role/experience; implement supervision logs; audit completion"},{"standard":"HRM.01.04.01","ep":"EP 2","question":"How is consultation made available to direct care staff (clinical questions, risk escalation, after-hours coverage), and how do staff access it?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"On-call schedule; escalation pathways; consultation documentation; policies for urgent situations","role":"Clinical Leadership / Medical Director","where_verified":"Policy; Staff Interview","common_findings":"No clear consultation pathway; after-hours gaps; staff unaware who to call","risk_level":"High","corrective_action":"Publish and train on consultation pathways; maintain on-call schedules; test via scenario drills"},{"standard":"HRM.01.04.01","ep":"EP 3","question":"How do staff provide and/or oversee supervision of students providing services as part of training (when not monitored by the educational institution)?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Student supervision policy; preceptor assignments; student documentation review logs","role":"Clinical Director / Education Coordinator","where_verified":"Policy; Records","common_findings":"Student supervision not defined; documentation not co-signed/reviewed as required","risk_level":"Moderate","corrective_action":"Assign qualified supervisors; document oversight; coordinate with schools and define monitoring responsibilities"},{"standard":"HRM.01.05.01","ep":"EP 1","question":"How do you determine when education and training are needed (competency gaps, responsibility changes, population needs), and how is staff participation documented?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Training needs assessment; role-based training plan; attendance logs/LMS; population needs analysis","role":"HR / QI / Department Leaders","where_verified":"Training Records; PI Files","common_findings":"Training offered but not tied to assessed needs; participation not documented","risk_level":"Moderate","corrective_action":"Perform training needs assessment; update plan; track completion; link to competence/performance outcomes"},{"standard":"HRM.01.05.01","ep":"EP 4","question":"If you sponsor or offer peer support services, what is your process to provide ongoing education and training to persons providing peer support to enhance knowledge and skills?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Peer training plan; CE records; supervision notes; coaching documentation","role":"Peer Services Lead / HR","where_verified":"Training Records; Staff Interview","common_findings":"No ongoing peer training process; training not documented","risk_level":"Moderate","corrective_action":"Create peer continuing education plan; document training; include in competency/performance reviews"},{"standard":"HRM.01.05.01","ep":"EP 11","question":"If staff perform pain screening, what training do they receive on screening individuals for pain and where is it documented?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Pain screening training module; competency check; documentation standards","role":"Clinical Director / Nursing / HR","where_verified":"Training Records; Staff Interview","common_findings":"Pain screening performed without training; inconsistent screening documentation","risk_level":"Moderate","corrective_action":"Implement pain screening training/competency; audit documentation and coach staff"},{"standard":"HRM.01.05.01","ep":"EP 12","question":"For acute 24-hour settings, how do direct-care staff receive education on pain assessment and pain management consistent with their scope of license?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Pain assessment/management training; role-based competency; scope-of-practice alignment documentation","role":"DON / Medical Director / HR","where_verified":"Training Records; Staff Interview","common_findings":"Acute setting staff not trained on pain assessment/management expectations","risk_level":"High","corrective_action":"Implement acute-setting pain education; validate competence; monitor via chart audits"},{"standard":"HRM.01.05.01","ep":"EP 17","question":"As part of workplace violence prevention, show me training provided at hire, annually, and when program changes occur\u2014how do you tailor content by role and address prevention, recognition, response, and reporting?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Workplace violence prevention program; training curriculum; annual completion reports; de-escalation/physical intervention training; reporting procedures","role":"HR / Safety Officer / Leadership","where_verified":"Training Records; Policy; Staff Interview","common_findings":"WVPP training missing/overdue; de-escalation training not role-based; reporting process unclear","risk_level":"High","corrective_action":"Implement WVPP training cadence and role-based modules; track completion; drill reporting and response; analyze incidents"},{"standard":"HRM.01.06.01","ep":"EP 1","question":"For each program/service, how do you define the competencies required for staff who provide care, treatment, or services (based on populations served and services provided)?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Competency matrices by program; job-specific competencies; population needs analysis","role":"Clinical Leadership / HR","where_verified":"Policy; Records","common_findings":"Competencies not defined per program; generic competencies not tied to services/patient risk","risk_level":"High","corrective_action":"Build program-specific competency matrices; approve and implement; review with leadership/QI"},{"standard":"HRM.01.06.01","ep":"EP 2","question":"Who assesses competence, and how do you ensure assessors have the appropriate background/experience/knowledge (or use qualified external assessors/guidelines)?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Assessor qualifications; designation letters; external assessor contracts; professional guidelines used","role":"Department Leaders / HR","where_verified":"Records; Staff Interview","common_findings":"Unqualified assessors; no documentation of assessor qualifications","risk_level":"Moderate","corrective_action":"Define assessor qualification criteria; designate in writing; document training/experience for assessors"},{"standard":"HRM.01.06.01","ep":"EP 3","question":"Show me your initial competence assessment for staff\u2014what methods are used and where is it documented?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Initial competency checklists; direct observation records; skills validation; documentation audits","role":"Department Leaders / HR","where_verified":"Training Records; HR Files","common_findings":"Initial competencies missing or incomplete; not performed before independent work","risk_level":"High","corrective_action":"Implement initial competency requirements before independent work; standardize documentation; audit new hires"},{"standard":"HRM.01.06.01","ep":"EP 4","question":"How do you reassess competence when job duties/responsibilities change (role change, new service, new population)?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Role change workflow; updated competency checklists; training records; change documentation","role":"Department Leaders / HR","where_verified":"HR Files; Training Records","common_findings":"New duties assigned without revalidation; no trigger when responsibilities change","risk_level":"High","corrective_action":"Create duty-change triggers in HR process; require retraining/competency sign-off; audit role changes"},{"standard":"HRM.01.06.01","ep":"EP 5","question":"How do you assess and document staff competence at least every three years (or more often per policy/law)?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"3-year competency schedule; completed reassessments; tracking logs; overdue reports","role":"HR / Department Leaders","where_verified":"Training Records; HR Files","common_findings":"3-year reassessments overdue; no tracking system","risk_level":"Moderate","corrective_action":"Implement competency tracking with reminders; complete overdue reassessments; report to leadership"},{"standard":"HRM.01.06.01","ep":"EP 6","question":"When competence does not meet expectations, what actions do you take (training, supervision, modifying duties), and how do you document follow-up and effectiveness?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Remediation plans; additional training records; supervision notes; reassessment results","role":"Department Leaders / HR","where_verified":"Records; HR Files","common_findings":"Gaps identified without remediation; remediation not re-evaluated for effectiveness","risk_level":"High","corrective_action":"Implement remediation workflow with reassessment; document outcomes; escalate persistent gaps"},{"standard":"HRM.01.06.03","ep":"EP 1","question":"For staff who assess, plan, and deliver services for substance use disorders, how do you verify they demonstrate knowledge about addictive behaviors and their treatment?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"SUD competency requirements; training/CE; supervision records; case reviews","role":"Clinical Director / HR","where_verified":"Training Records; Staff Interview","common_findings":"SUD staff competencies not defined or not validated; training not documented","risk_level":"High","corrective_action":"Define SUD knowledge competencies; validate via training/case review; document competence"},{"standard":"HRM.01.06.03","ep":"EP 2","question":"How do you ensure the total complement of staff possesses the required SUD assessment/treatment competencies (rapport, diagnosis criteria, intox/withdrawal screening, danger screening, co-occurring screening, treatment planning, ethics, professional development)?","criteria":"0=Not implemented/no evidence; 1=Partially implemented or inconsistent/high-risk gaps; 2=Mostly implemented with minor gaps; 3=Fully implemented, effective, sustained","evidence":"Team competency matrix; role delineation; training plan; supervision/case conference not
